<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli PRO | Randevu & Yönetim</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; font-family: 'Inter', sans-serif; color: #e5e7eb; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%); color: #000; font-weight: 900; }
        .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 1rem; width: 100%; outline: none; }
        .input-style:focus { border-color: #d4af37; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // Admin girişini oturum bazlı kalıcı yapıyoruz
            const [view, setView] = useState(sessionStorage.getItem('admin_session') === 'true' ? 'admin' : 'customer'); 
            const [adminTab, setAdminTab] = useState('randevular');
            const [sorguNo, setSorguNo] = useState("");
            const [bulunanRandevular, setBulunanRandevular] = useState(null);

            const [randevular, setRandevular] = useState([]);
            const [tamamlananlar, setTamamlananlar] = useState([]);
            const [hizmetler, setHizmetler] = useState([
                { id: 1, ad: 'Saç Kesimi', fiyat: 350 },
                { id: 2, ad: 'Sakal Tasarımı', fiyat: 200 }
            ]);
            const [berberler, setBerberler] = useState([{ id: 1, ad: 'Ahmet Tekeli' }]);

            const mesaiSaatleri = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

            useEffect(() => {
                const data = JSON.parse(localStorage.getItem('barber_v4')) || {};
                if(data.randevular) setRandevular(data.randevular);
                if(data.tamamlananlar) setTamamlananlar(data.tamamlananlar);
                if(data.hizmetler) setHizmetler(data.hizmetler);
                if(data.berberler) setBerberler(data.berberler);
            }, []);

            useEffect(() => {
                localStorage.setItem('barber_v4', JSON.stringify({ randevular, tamamlananlar, hizmetler, berberler }));
            }, [randevular, tamamlananlar, hizmetler, berberler]);

            const adminGiris = () => {
                if(view === 'admin') {
                    sessionStorage.removeItem('admin_session');
                    setView('customer');
                } else {
                    const p = prompt("Yönetici Şifresi:");
                    if(p === "1923") {
                        sessionStorage.setItem('admin_session', 'true');
                        setView('admin');
                    }
                }
            };

            const randevuSorgula = () => {
                const sonuc = randevular.filter(r => r.tel === sorguNo);
                setBulunanRandevular(sonuc);
            };

            return (
                <div className="min-h-screen">
                    <nav className="p-4 flex justify-between items-center glass sticky top-0 z-50 px-8">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 gold-btn rounded-full flex items-center justify-center text-black font-bold text-xs">A</div>
                            <span className="font-black text-yellow-500 uppercase italic">Ahmet Tekeli PRO</span>
                        </div>
                        <button onClick={adminGiris} className="text-[10px] font-bold border border-yellow-900/50 px-4 py-1 rounded-full">
                            {view === 'admin' ? 'ÇIKIŞ YAP' : 'ADMİN PANELİ'}
                        </button>
                    </nav>

                    {view === 'customer' ? (
                        <div className="max-w-md mx-auto p-6 space-y-8">
                            {/* RANDEVU FORMU */}
                            <div className="glass rounded-[2.5rem] p-8 shadow-2xl border-t border-white/10">
                                <h2 className="text-xl font-black mb-6 text-center text-white uppercase tracking-tighter italic">Hızlı Randevu Al</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    setRandevular([...randevular, { id: Date.now(), musteri: fd.get('ad'), tel: fd.get('tel'), berber: fd.get('berber'), hizmet: fd.get('hizmet'), tarih: fd.get('tarih'), saat: fd.get('saat') }]);
                                    alert("Randevunuz kaydedildi. 'Sorgula' kısmından takip edebilirsiniz.");
                                    e.target.reset();
                                }} className="space-y-4">
                                    <input name="ad" placeholder="Adınız Soyadınız" className="input-style" required />
                                    <input name="tel" placeholder="Telefon (05xxxxxxxxx)" type="tel" className="input-style" required />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select name="berber" className="input-style text-sm" required>
                                            <option value="">Berber Seç</option>
                                            {berberler.map(b => <option key={b.id}>{b.ad}</option>)}
                                        </select>
                                        <select name="hizmet" className="input-style text-sm" required>
                                            <option value="">İşlem Seç</option>
                                            {hizmetler.map(h => <option key={h.id}>{h.ad}</option>)}
                                        </select>
                                    </div>
                                    <input name="tarih" type="date" className="input-style" required />
                                    <div className="grid grid-cols-4 gap-2">
                                        {mesaiSaatleri.map(s => (
                                            <label key={s} className="cursor-pointer">
                                                <input type="radio" name="saat" value={s} className="hidden peer" required />
                                                <div className="bg-white/5 border border-white/10 p-2 rounded-xl text-[10px] text-center peer-checked:bg-yellow-600 peer-checked:text-black">{s}</div>
                                            </label>
                                        ))}
                                    </div>
                                    <button className="gold-btn w-full p-4 rounded-3xl mt-2 uppercase tracking-widest shadow-lg shadow-yellow-600/20 active:scale-95 transition">Randevuyu Tamamla</button>
                                </form>
                            </div>

                            {/* RANDEVU SORGULAMA EKRANI */}
                            <div className="glass rounded-[2rem] p-6 border border-blue-900/20">
                                <h3 className="text-sm font-bold mb-4 text-blue-400 uppercase italic"><i className="fa-solid fa-magnifying-glass mr-2"></i>Randevumu Sorgula</h3>
                                <div className="flex gap-2 mb-4">
                                    <input value={sorguNo} onChange={(e)=>setSorguNo(e.target.value)} placeholder="Telefon numaranızı girin" className="flex-1 bg-black border border-white/10 p-3 rounded-xl text-xs outline-none focus:border-blue-500" />
                                    <button onClick={randevuSorgula} className="bg-blue-600 px-4 rounded-xl text-xs font-bold">Bul</button>
                                </div>
                                {bulunanRandevular && (
                                    <div className="space-y-2 animate-in fade-in">
                                        {bulunanRandevular.length > 0 ? bulunanRandevular.map(r => (
                                            <div key={r.id} className="bg-white/5 p-4 rounded-xl border border-white/5">
                                                <p className="text-yellow-500 font-bold text-xs">{r.tarih} - {r.saat}</p>
                                                <p className="text-sm font-bold uppercase">{r.hizmet}</p>
                                                <p className="text-[10px] text-gray-500">Berber: {r.berber}</p>
                                            </div>
                                        )) : <p className="text-[10px] text-red-400 italic">Kayıtlı randevu bulunamadı.</p>}
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : (
                        /* YÖNETİCİ PANELİ (Admin Tabları vb. buraya gelir) */
                        <div className="p-8 max-w-6xl mx-auto">
                            <h2 className="text-2xl font-black text-yellow-500 mb-8 italic uppercase tracking-widest">Yönetim Merkezi</h2>
                            {/* Önceki sürümdeki admin tabları ve randevu listesi aynı şekilde çalışır */}
                            <div className="grid md:grid-cols-2 gap-4">
                                {randevular.map(r => (
                                    <div key={r.id} className="glass p-6 rounded-3xl flex justify-between items-center border-l-4 border-yellow-600">
                                        <div>
                                            <p className="text-xs font-bold text-gray-500">{r.tarih} | {r.saat}</p>
                                            <h4 className="text-xl font-black uppercase tracking-tight">{r.musteri}</h4>
                                            <p className="text-[10px] text-blue-400 font-bold uppercase">{r.hizmet} - {r.tel}</p>
                                        </div>
                                        <button onClick={() => setRandevular(randevular.filter(x => x.id !== r.id))} className="text-red-500 p-2"><i className="fa-solid fa-trash"></i></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
