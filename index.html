<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli KASA - V21</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .p-btn { transition: all 0.2s; border: 2px solid transparent; background-color: #f8fafc; color: #64748b; }
        .active-p { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 900 !important; }
        .islem-row:nth-child(even) { background-color: #f9fafb; }
        #raporModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .rapor-icerik { background: white; width: 100%; max-width: 350px; border-radius: 2rem; padding: 20px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-100 p-2 text-slate-900 text-[10px]">

    <div id="raporModal" onclick="this.style.display='none'">
        <div class="rapor-icerik shadow-2xl border border-slate-200" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-base font-black uppercase tracking-tighter">AYLIK DETAYLI RAPOR</h2>
                <button onclick="document.getElementById('raporModal').style.display='none'" class="text-red-500 font-black text-xs">KAPAT</button>
            </div>
            <div id="raporData" class="space-y-3"></div>
            <div class="mt-4 pt-3 border-t text-[8px] text-slate-400 italic text-center">Ahmet Tekeli VIP Kasa Sistemi</div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-4 min-h-[95vh] flex flex-col border border-slate-200">
        
        <div class="text-center mb-3">
            <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none italic">AHMET TEKELİ KASA</h1>
            <p id="bugunTarih" class="text-[8px] font-bold text-blue-600 tracking-widest uppercase mt-1 italic"></p>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-2">
            <button onclick="pSec('Sahip')" id="btnSahip" class="p-btn active-p p-2 rounded-xl font-black uppercase flex flex-col items-center gap-1">
                <i class="fa-solid fa-scissors text-blue-600 text-sm"></i><span>AHMET</span>
            </button>
            <button onclick="pSec('Ercan')" id="btnErcan" class="p-btn p-2 rounded-xl font-black uppercase flex flex-col items-center gap-1">
                <i class="fa-solid fa-scissors text-orange-500 text-sm"></i><span>ERCAN</span>
            </button>
            <button onclick="pSec('Efe')" id="btnEfe" class="p-btn p-2 rounded-xl font-black uppercase flex flex-col items-center gap-1">
                <i class="fa-solid fa-scissors text-purple-500 text-sm"></i><span>EFE</span>
            </button>
            <button onclick="pSec('Turancan')" id="btnTurancan" class="p-btn p-1.5 rounded-lg font-bold uppercase">TURAN</button>
            <button onclick="pSec('Bekir')" id="btnBekir" class="p-btn p-1.5 rounded-lg font-bold uppercase">BEKİR</button>
            <button onclick="pSec('Gider')" id="btnGider" class="p-btn bg-red-50 text-red-600 p-1.5 rounded-lg font-bold uppercase italic text-[8px] flex flex-col items-center">
                <i class="fa-solid fa-wallet text-[9px]"></i><span>GİDER</span>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-3">
            <button onclick="hizliDoldur('Saç', 500)" class="bg-white border py-2 rounded-lg font-bold shadow-sm active:bg-slate-50">SAÇ</button>
            <button onclick="hizliDoldur('Sakal', 250)" class="bg-white border py-2 rounded-lg font-bold shadow-sm active:bg-slate-50">SAKAL</button>
            <button onclick="hizliDoldur('Saç Sakal', 700)" class="bg-blue-50 border-blue-200 border py-2 rounded-lg font-black text-blue-700 active:bg-blue-100">SAÇ SAKAL</button>
            <button onclick="hizliDoldur('Çocuk', 450)" class="bg-emerald-50 border-emerald-100 border py-2 rounded-lg font-bold text-emerald-700">ÇOCUK</button>
            <button onclick="hizliDoldur('Haftalık Ödeme', 0)" class="bg-red-600 text-white py-2 rounded-lg font-black uppercase col-span-2 shadow-md active:bg-red-700">MAAŞ ÖDEMESİ</button>
        </div>

        <div class="bg-slate-100 p-3 rounded-2xl mb-3 shadow-inner border border-slate-200">
            <div class="flex gap-2 mb-2">
                <input type="text" id="h" placeholder="İşlem Adı" class="w-1/2 p-2.5 rounded-xl border-none font-bold outline-none text-[10px]">
                <input type="number" id="t" placeholder="₺" class="w-1/2 p-2.5 rounded-xl border-none font-black outline-none text-blue-600 text-base">
            </div>
            <div class="flex gap-2">
                <select id="y" class="w-full p-2.5 rounded-xl bg-white font-black outline-none border border-gray-200">
                    <option value="Nakit">NAKİT</option>
                    <option value="Kart">KART</option>
                    <option value="Iban">IBAN</option>
                </select>
                <button onclick="kaydet()" id="kayitBtn" class="bg-slate-800 text-white px-6 rounded-xl font-bold uppercase active:scale-95 transition-transform">KAYDET</button>
            </div>
        </div>

        <div class="flex-grow bg-slate-50 rounded-xl border border-slate-200 overflow-hidden mb-3 flex flex-col min-h-[100px]">
            <div class="overflow-y-auto max-h-32 flex-grow text-[8px]" id="islemListesi"></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3">
            <div class="bg-orange-50 p-2 rounded-xl border border-orange-200">
                <p class="font-black text-orange-600 text-center text-[7px] uppercase">ERCAN (%50)</p>
                <div class="flex justify-between font-black text-[9px] mt-1">
                    <span>İŞ: <span id="eToplamIs">0</span></span>
                    <span class="text-blue-700">PAY: <span id="pErcan">0</span></span>
                </div>
            </div>
            <div class="bg-purple-50 p-2 rounded-xl border border-purple-200">
                <p class="font-black text-purple-600 text-center text-[7px] uppercase">EFE (%30)</p>
                <div class="flex justify-between font-black text-[9px] mt-1">
                    <span>İŞ: <span id="fToplamIs">0</span></span>
                    <span class="text-blue-700">PAY: <span id="pEfe">0</span></span>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-3 rounded-2xl shadow-xl mb-3">
            <div class="flex justify-between items-center mb-1">
                <p class="text-[8px] font-bold text-slate-400 uppercase">GÜNLÜK NET KÂR</p>
                <p id="netKalan" class="text-xl font-black text-emerald-400">0 ₺</p>
            </div>
            <div class="flex justify-between text-[7px] font-bold text-slate-400 border-t border-white/10 pt-1">
                <span>CİRO: <span id="cToplam" class="text-white">0₺</span></span>
                <span>TOPLAM GİDER: <span id="gToplam" class="text-red-400">0₺</span></span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="kasaSifirla()" class="py-3 bg-emerald-600 text-white text-[9px] font-black rounded-xl uppercase active:scale-95 shadow-md">GÜNÜ KAPAT</button>
            <button onclick="aySifirla()" class="py-3 bg-red-600 text-white text-[9px] font-black rounded-xl uppercase active:scale-95 shadow-md">AYI SIFIRLA</button>
        </div>

        <div onclick="raporUret()" class="mt-3 bg-blue-600 text-white py-2 rounded-xl text-center shadow-md cursor-pointer active:scale-95 transition-all border-2 border-blue-400">
            <h2 id="aylikCiro" class="text-sm font-black">0 ₺</h2>
            <p class="text-[6px] font-bold uppercase opacity-80 tracking-tighter italic">AYLIK BİRİKMİŞ KAZANÇ (RAPOR)</p>
        </div>
    </div>

    <script>
        // Firebase Ayarları
        const firebaseConfig = { apiKey: "AIzaSyDpT9QsG7V23KtKZMVXmIfeX_Mg-eAeBZM", databaseURL: "https://berberkasa-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "berberkasa" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let p = 'Sahip'; 
        let hesaplanmisNet = 0; 
        let sonKasaVerisi = null;
        const simdi = new Date();
        const ayID = simdi.getFullYear() + "-" + (simdi.getMonth() + 1);
        
        document.getElementById('bugunTarih').innerText = simdi.toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

        function pSec(sec) { p = sec; document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-p')); document.getElementById('btn' + sec).classList.add('active-p'); }
        
        function hizliDoldur(islem, fiyat) { 
            document.getElementById('h').value = islem; 
            document.getElementById('t').value = fiyat; 
            document.getElementById('t').focus();
        }

        function kaydet() {
            const h = document.getElementById('h').value; 
            const t = parseFloat(document.getElementById('t').value); 
            const y = document.getElementById('y').value;
            if(!h || isNaN(t)) return;
            
            db.ref('kasa/').push({ 
                h, t, y, p, 
                tarih: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}) 
            });
            
            document.getElementById('h').value = ''; 
            document.getElementById('t').value = '';
            document.getElementById('h').focus();
        }

        db.ref('kasa/').on('value', (snapshot) => {
            const veriler = snapshot.val(); 
            sonKasaVerisi = veriler;
            const listDiv = document.getElementById('islemListesi');
            listDiv.innerHTML = "";
            
            let tC=0, gT=0; 
            let m = { Ercan:0, Efe:0, Turancan:0, Bekir:0 }; 
            let u = { Ercan:0, Efe:0 };

            if (veriler) {
                Object.values(veriler).reverse().forEach(v => {
                    const t = parseFloat(v.t);
                    listDiv.innerHTML += `<div class="islem-row flex justify-between p-1.5 border-b"><span><b>${v.p}:</b> ${v.h}</span><span class="font-black">${t} ₺</span></div>`;
                    
                    if (v.h.includes('Ödeme')) { gT += t; if(m[v.p] !== undefined) m[v.p] += t; } 
                    else if (v.p === 'Gider') { gT += t; } 
                    else { tC += t; if(v.p==='Ercan') u.Ercan += t; if(v.p==='Efe') u.Efe += t; }
                });
            }

            const ePay = Math.floor(u.Ercan * 0.5); 
            const fPay = Math.floor(u.Efe * 0.3);
            hesaplanmisNet = Math.floor(tC - (ePay + fPay + gT));

            document.getElementById('eToplamIs').innerText = u.Ercan; 
            document.getElementById('fToplamIs').innerText = u.Efe;
            document.getElementById('pErcan').innerText = ePay; 
            document.getElementById('pEfe').innerText = fPay;
            document.getElementById('cToplam').innerText = tC + " ₺"; 
            document.getElementById('gToplam').innerText = gT + " ₺";
            document.getElementById('netKalan').innerText = hesaplanmisNet + " ₺";
        });

        function raporUret() {
            if(!sonKasaVerisi) { alert("Kasa şu an boş abi."); return; }
            
            let r = { 
                Sahip: 0, Ercan: {is:0, maas:0}, Efe: {is:0, maas:0}, 
                Turancan: {maas:0}, Bekir: {maas:0}, Gider: 0, Ciro:0 
            };

            Object.values(sonKasaVerisi).forEach(v => {
                const t = parseFloat(v.t);
                if(v.h.includes('Ödeme')) { if(r[v.p]) r[v.p].maas += t; }
                else if(v.p === 'Gider') { r.Gider += t; }
                else { r.Ciro += t; if(v.p === 'Sahip') r.Sahip += t; else if(r[v.p]) r[v.p].is += t; }
            });

            const ePay = r.Ercan.is * 0.5;
            const fPay = r.Efe.is * 0.3;
            const toplamGider = ePay + fPay + r.Ercan.maas + r.Efe.maas + r.Turancan.maas + r.Bekir.maas + r.Gider;
            const netKar = r.Ciro - toplamGider;

            document.getElementById('raporData').innerHTML = `
                <div class="bg-slate-50 p-3 rounded-2xl border">
                    <p class="font-black text-blue-600 text-center border-b mb-2 pb-1 text-[9px]">USTA PERFORMANS</p>
                    <div class="space-y-1.5 text-[9px]">
                        <div class="flex justify-between"><span><b>AHMET:</b></span> <span>${r.Sahip} ₺</span></div>
                        <div class="flex justify-between border-t pt-1"><span><b>ERCAN (%50):</b></span> <span>İş: ${r.Ercan.is} ₺ / Pay: ${Math.floor(ePay)} ₺</span></div>
                        <div class="flex justify-between border-t pt-1"><span><b>EFE (%30):</b></span> <span>İş: ${r.Efe.is} ₺ / Pay: ${Math.floor(fPay)} ₺</span></div>
                    </div>
                </div>
                <div class="bg-red-50 p-3 rounded-2xl border border-red-100">
                    <p class="font-black text-red-600 text-center border-b mb-2 pb-1 text-[9px]">ÖDEMELER</p>
                    <div class="grid grid-cols-2 gap-2 text-[8px]">
                        <span>Ercan: ${r.Ercan.maas}₺</span><span>Efe: ${r.Efe.maas}₺</span>
                        <span>Turan: ${r.Turancan.maas}₺</span><span>Bekir: ${r.Bekir.maas}₺</span>
                        <span class="col-span-2 border-t pt-1 text-red-800 font-bold">Dükkan Gider: ${r.Gider}₺</span>
                    </div>
                </div>
                <div class="bg-slate-900 text-white p-4 rounded-2xl text-center shadow-lg">
                    <p class="text-[7px] text-slate-400 uppercase tracking-widest">DÜKKAN NET KAZANÇ</p>
                    <p class="text-2xl font-black text-emerald-400">${Math.floor(netKar)} ₺</p>
                    <p class="text-[7px] mt-1 opacity-60">Toplam Ciro: ${r.Ciro} ₺</p>
                </div>
            `;
            document.getElementById('raporModal').style.display = 'flex';
        }

        db.ref('aylikNet/' + ayID).on('value', (snapshot) => { 
            document.getElementById('aylikCiro').innerText = Math.floor(snapshot.val() || 0).toLocaleString('tr-TR') + " ₺"; 
        });

        function kasaSifirla() { 
            if(confirm("Günü kapatıp net kârı aylık kazanca aktarıyorsun abi?")) { 
                db.ref('aylikNet/' + ayID).transaction(curr => (curr || 0) + hesaplanmisNet); 
                db.ref('kasa/').remove(); 
            } 
        }

        function aySifirla() { if(confirm("Tüm ayı sıfırlamak istediğine emin misin?")) db.ref('aylikNet/' + ayID).set(0); }
    </script>
</body>
</html>
