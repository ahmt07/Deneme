<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli - Randevu Sistemi</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .gold-btn { background: linear-gradient(135deg, #c5a059 0%, #8e6d2f 100%); }
    </style>
</head>
<body class="text-white min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function BarberApp() {
            const [isAdmin, setIsAdmin] = useState(false);
            const [selectedDate, setSelectedDate] = useState("");
            const [selectedBerber, setSelectedBerber] = useState("");
            const [randevular, setRandevular] = useState([]);
            const [islemler, setIslemler] = useState([]);
            
            // Sabit Mesai Saatleri
            const mesaiSaatleri = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];

            // Örnek Veriler (Bunları Admin Panelinden değiştirebilirsin)
            const hizmetler = [
                { ad: 'Saç Kesimi', fiyat: 300 },
                { ad: 'Sakal Tıraşı', fiyat: 150 },
                { ad: 'Cilt Bakımı', fiyat: 200 }
            ];
            const berberler = ["Ahmet Tekeli", "Usta Mehmet", "Genç Ali"];

            useEffect(() => {
                setRandevular(JSON.parse(localStorage.getItem('b_randevular')) || []);
                setIslemler(JSON.parse(localStorage.getItem('b_islemler')) || []);
            }, []);

            const randevuAl = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const yeni = {
                    id: Date.now(),
                    adSoyad: formData.get('adSoyad'),
                    telefon: formData.get('telefon'),
                    berber: formData.get('berber'),
                    hizmet: formData.get('hizmet'),
                    tarih: selectedDate,
                    saat: formData.get('saat')
                };
                const güncellenmiş = [...randevular, yeni];
                setRandevular(güncellenmiş);
                localStorage.setItem('b_randevular', JSON.stringify(güncellenmiş));
                alert("Randevunuz Onaylandı!");
            };

            // Belirli bir tarih ve berber için DOLU saatleri bulur
            const doluSaatler = randevular
                .filter(r => r.tarih === selectedDate && r.berber === selectedBerber)
                .map(r => r.saat);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    {/* Üst Kısım */}
                    <div className="w-full max-w-lg flex justify-end mb-4">
                        <button onClick={() => {
                            const p = prompt("Şifre:");
                            if(p === "1923") setIsAdmin(!isAdmin);
                        }} className="bg-white/20 px-4 py-2 rounded-lg text-xs font-bold hover:bg-white/30 transition">
                            {isAdmin ? "Çıkış Yap" : "Admin Girişi"}
                        </button>
                    </div>

                    {!isAdmin ? (
                        /* MÜŞTERİ PANELİ (Görseldeki Tasarım) */
                        <div className="glass w-full max-w-md rounded-[40px] p-8 shadow-2xl animate-in fade-in zoom-in duration-500">
                            <div className="text-center mb-6">
                                <div className="w-20 h-20 bg-white rounded-full mx-auto mb-4 border-4 border-yellow-600 flex items-center justify-center overflow-hidden">
                                    <img src="https://cdn-icons-png.flaticon.com/512/1004/1004611.png" className="w-12 h-12 opacity-80" />
                                </div>
                                <h2 className="text-2xl font-black tracking-tight text-white uppercase">Ahmet Tekeli</h2>
                                <p className="text-gray-300 text-xs font-bold tracking-widest uppercase">Erkek Kuaförü</p>
                                <p className="text-yellow-500 mt-1 text-sm">★ 4.8 (164)</p>
                            </div>

                            <form onSubmit={randevuAl} className="space-y-4">
                                <input name="adSoyad" placeholder="Adınız ve Soyadınız" className="w-full bg-white/10 border border-white/20 p-3 rounded-xl outline-none focus:bg-white/20 transition" required />
                                <input name="telefon" placeholder="05xxxxxxxxx" type="tel" className="w-full bg-white/10 border border-white/20 p-3 rounded-xl outline-none" required />
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <select name="berber" onChange={(e)=>setSelectedBerber(e.target.value)} className="bg-white/10 border border-white/20 p-3 rounded-xl outline-none text-sm" required>
                                        <option value="">Berber Seçin</option>
                                        {berberler.map(b => <option key={b} value={b} className="text-black">{b}</option>)}
                                    </select>
                                    <select name="hizmet" className="bg-white/10 border border-white/20 p-3 rounded-xl outline-none text-sm" required>
                                        <option value="">İşlem Seçin</option>
                                        {hizmetler.map(h => <option key={h.ad} value={h.ad} className="text-black">{h.ad} ({h.fiyat}₺)</option>)}
                                    </select>
                                </div>

                                <input type="date" onChange={(e)=>setSelectedDate(e.target.value)} className="w-full bg-white/10 border border-white/20 p-3 rounded-xl outline-none" required />

                                {selectedDate && selectedBerber ? (
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-gray-400 uppercase">Uygun Saatler</label>
                                        <div className="grid grid-cols-4 gap-2">
                                            {mesaiSaatleri.map(saat => {
                                                const isDolu = doluSaatler.includes(saat);
                                                return (
                                                    <label key={saat} className={`relative cursor-pointer text-center p-2 rounded-lg text-xs font-bold transition ${isDolu ? 'bg-red-900/40 text-gray-500 cursor-not-allowed' : 'bg-green-600/20 hover:bg-green-600/40 text-green-400 border border-green-600/30'}`}>
                                                        <input type="radio" name="saat" value={saat} disabled={isDolu} className="hidden" required />
                                                        {saat}
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ) : (
                                    <p className="text-[10px] text-gray-400 italic text-center">Lütfen önce tarih ve berber seçin.</p>
                                )}

                                <button type="submit" className="gold-btn w-full p-4 rounded-xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition mt-4">Randevu Al</button>
                            </form>
                        </div>
                    ) : (
                        /* YÖNETİCİ MODU */
                        <div className="glass w-full max-w-4xl rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom duration-500">
                            <h2 className="text-xl font-bold text-yellow-500 mb-6 uppercase tracking-tighter">İşletme Yönetimi</h2>
                            <div className="grid md:grid-cols-2 gap-6">
                                <div className="space-y-4">
                                    <h3 className="text-sm font-bold text-blue-400 uppercase">Gelen Randevular</h3>
                                    {randevular.map(r => (
                                        <div key={r.id} className="bg-black/40 p-4 rounded-2xl border border-white/10 flex justify-between items-center">
                                            <div>
                                                <p className="font-bold">{r.adSoyad}</p>
                                                <p className="text-[10px] text-gray-400">{r.tarih} | {r.saat} | {r.berber}</p>
                                            </div>
                                            <button onClick={() => setRandevular(randevular.filter(x => x.id !== r.id))} className="text-red-500 hover:scale-110 transition">✕</button>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-black/40 p-6 rounded-2xl border border-white/10 h-fit">
                                    <h3 className="text-sm font-bold text-green-500 uppercase mb-4 text-center">Günlük Finans Özeti</h3>
                                    <div className="text-center space-y-2">
                                        <p className="text-[10px] text-gray-500">Bekleyen Randevu</p>
                                        <p className="text-3xl font-black">{randevular.length}</p>
                                        <hr className="border-white/10 my-4" />
                                        <p className="text-[10px] text-gray-500">Tahmini Ciro</p>
                                        <p className="text-2xl font-bold text-green-400">₺ {randevular.length * 300}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BarberApp />);
    </script>
</body>
</html>
