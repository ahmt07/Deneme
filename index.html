<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli KASA - V24.3</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .p-btn { transition: all 0.2s; border: 2px solid #e2e8f0; background-color: white; color: #64748b; }
        .active-p { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 900 !important; transform: scale(1.02); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-icerik { background: white; width: 100%; max-width: 400px; border-radius: 2rem; padding: 20px; max-height: 90vh; overflow-y: auto; }
        /* Usta Panelleri İçin Stil */
        .usta-panel { min-height: 60px; max-height: 120px; overflow-y: auto; font-size: 8px; font-style: italic; scrollbar-width: none; }
        .usta-panel::-webkit-scrollbar { display: none; }
        .sil-btn { width: 24px; height: 24px; display: flex; items-center: center; justify-content: center; background: #fee2e2; color: #ef4444; border-radius: 6px; font-size: 12px; font-weight: bold; margin-left: 8px; }
        @media print { .no-print { display: none !important; } .modal-overlay { position: relative; background: white; display: block !important; padding: 0; } }
    </style>
</head>
<body class="bg-slate-50 p-2 text-slate-900 text-[10px]">

    <div id="veresiyeModal" class="modal-overlay"><div class="modal-icerik shadow-2xl border border-slate-200 text-[9px]"><div class="flex justify-between items-center mb-4 border-b pb-2"><h2 class="font-black uppercase text-blue-800">VERESİYE DEFTERİ</h2><button onclick="document.getElementById('veresiyeModal').style.display='none'" class="text-red-500 font-black px-2 py-1 rounded-lg uppercase">Kapat</button></div><div class="bg-slate-100 p-2 rounded-xl mb-3"><input type="text" id="vMusteri" placeholder="Müşteri Adı" class="w-full p-2 mb-2 rounded-lg border-none font-bold text-[10px]"><div class="flex gap-1"><input type="number" id="vTutar" placeholder="₺ Borç" class="w-1/2 p-2 rounded-lg border-none font-black text-blue-600"><button onclick="veresiyeEkle()" class="w-1/2 bg-blue-600 text-white rounded-lg font-bold uppercase">EKLE</button></div></div><input type="text" id="vAra" onkeyup="veresiyeListele()" placeholder="Müşteri Ara..." class="w-full p-2 mb-2 border rounded-lg font-bold"><div id="veresiyeListesi" class="space-y-2 overflow-y-auto max-h-60"></div></div></div>
    <div id="giderModal" class="modal-overlay"><div class="modal-icerik shadow-2xl border border-slate-200 text-[9px]"><div class="flex justify-between items-center mb-4 border-b pb-2"><h2 class="font-black uppercase text-red-800">DÜKKAN GİDERLERİ</h2><button onclick="document.getElementById('giderModal').style.display='none'" class="text-red-500 font-black px-2 py-1 rounded-lg uppercase">Kapat</button></div><div class="bg-red-50 p-2 rounded-xl mb-3"><input type="text" id="gAd" placeholder="Gider Adı" class="w-full p-2 mb-2 rounded-lg border-none font-bold text-[10px]"><div class="flex gap-1"><input type="number" id="gTutar" placeholder="₺ Tutar" class="w-1/2 p-2 rounded-lg border-none font-black text-red-600"><button onclick="giderPanelEkle()" class="w-1/2 bg-red-600 text-white rounded-lg font-bold uppercase">KAYDET</button></div></div><input type="text" id="gAra" onkeyup="giderPanelListele()" placeholder="Gider Ara..." class="w-full p-2 mb-2 border rounded-lg font-bold"><div id="giderPanelListesi" class="space-y-2 overflow-y-auto max-h-60"></div></div></div>
    <div id="raporModal" class="modal-overlay"><div class="modal-icerik shadow-2xl border border-slate-200 text-[9px]"><div class="flex justify-between items-center mb-4 border-b pb-2 no-print"><h2 class="font-black text-blue-800 uppercase italic">GÜNLÜK ÖZET</h2><div class="flex gap-1"><button onclick="window.print()" class="text-blue-600 font-black border px-2 py-1 rounded-lg">YAZDIR</button><button onclick="document.getElementById('raporModal').style.display='none'" class="text-red-500 font-black border px-2 py-1 rounded-lg">KAPAT</button></div></div><div id="raporData" class="space-y-4"></div></div></div>
    <div id="arsivModal" class="modal-overlay"><div class="modal-icerik shadow-2xl border border-slate-200 text-[9px]"><div class="flex justify-between items-center mb-4 border-b pb-2 text-[10px]"><h2 class="font-black text-slate-800 uppercase italic text-sm">Geçmiş Kayıtlar</h2><button onclick="document.getElementById('arsivModal').style.display='none'" class="text-red-500 font-black px-2">KAPAT</button></div><input type="date" id="arsivTarihSec" onchange="arsivGetir(this.value)" class="w-full p-2 mb-4 border rounded-lg font-bold"><div id="arsivSonuc" class="space-y-2 min-h-[100px]"></div></div></div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-4 min-h-[95vh] flex flex-col border border-slate-100">
        
        <div class="flex justify-between items-center mb-3 px-1">
            <button onclick="document.getElementById('veresiyeModal').style.display='flex'" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-black text-[7px] uppercase border border-blue-200 shadow-sm">VERESİYE</button>
            <div class="text-center">
                <h1 class="text-lg font-black text-slate-900 tracking-tighter uppercase leading-none italic">AHMET TEKELİ KASA</h1>
                <p id="bugunTarih" class="text-[7px] font-bold text-blue-600 tracking-widest uppercase mt-1 italic"></p>
            </div>
            <button onclick="document.getElementById('giderModal').style.display='flex'" class="bg-red-50 text-red-600 px-3 py-1.5 rounded-full font-black text-[7px] uppercase border border-red-200 shadow-sm">GİDERLER</button>
        </div>

        <div class="grid grid-cols-1 gap-2 mb-3">
            <div class="border-2 border-blue-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                <button onclick="pSec('ahmet')" id="btnahmet" class="p-btn active-p w-full p-2 font-black uppercase text-[10px] flex items-center justify-center gap-2 border-none"><i class="fa-solid fa-scissors"></i> AHMET</button>
                <div id="listeAhmet" class="usta-panel bg-blue-50/20 px-2 divide-y divide-slate-100"></div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="border-2 border-orange-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                    <button onclick="pSec('Ercan')" id="btnErcan" class="p-btn w-full p-2 font-black uppercase text-[10px] flex items-center justify-center gap-2 border-none text-orange-600"><i class="fa-solid fa-scissors text-orange-400"></i> ERCAN</button>
                    <div id="listeErcan" class="usta-panel bg-orange-50/20 px-2 divide-y divide-slate-100"></div>
                </div>
                <div class="border-2 border-purple-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                    <button onclick="pSec('Efe')" id="btnEfe" class="p-btn w-full p-2 font-black uppercase text-[10px] flex items-center justify-center gap-2 border-none text-purple-600"><i class="fa-solid fa-scissors text-purple-400"></i> EFE</button>
                    <div id="listeEfe" class="usta-panel bg-purple-50/20 px-2 divide-y divide-slate-100"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="border border-slate-100 rounded-xl overflow-hidden bg-white shadow-sm">
                    <button onclick="pSec('Turancan')" id="btnTurancan" class="p-btn w-full p-1.5 font-bold uppercase text-[8px] border-none">TURANCAN</button>
                    <div id="listeTurancan" class="usta-panel h-[40px] px-1 bg-slate-50/30"></div>
                </div>
                <div class="border border-slate-100 rounded-xl overflow-hidden bg-white shadow-sm">
                    <button onclick="pSec('Bekir')" id="btnBekir" class="p-btn w-full p-1.5 font-bold uppercase text-[8px] border-none">BEKİR</button>
                    <div id="listeBekir" class="usta-panel h-[40px] px-1 bg-slate-50/30"></div>
                </div>
                <div class="border border-red-100 rounded-xl overflow-hidden bg-white shadow-sm">
                    <button onclick="pSec('Gider')" id="btnGider" class="p-btn w-full p-1.5 font-bold uppercase text-[8px] border-none text-red-600 bg-red-50/50 flex items-center justify-center gap-1"><i class="fa-solid fa-wallet"></i> GİDER</button>
                    <div id="listeGider" class="usta-panel h-[40px] px-1 bg-red-50/20"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-1.5 mb-3">
            <button onclick="hizliDoldur('Saç', 500)" class="bg-white border-2 border-slate-100 py-3 rounded-xl font-bold shadow-sm active:bg-slate-100 transition-colors">SAÇ</button>
            <button onclick="hizliDoldur('Sakal', 250)" class="bg-white border-2 border-slate-100 py-3 rounded-xl font-bold shadow-sm active:bg-slate-100 transition-colors">SAKAL</button>
            <button onclick="hizliDoldur('çocuk saç kesim', 450)" class="bg-white border-2 border-slate-100 py-3 rounded-xl font-bold shadow-sm text-[8px] leading-tight active:bg-slate-100 transition-colors">ÇOCUK</button>
            <button onclick="hizliDoldur('Saç Sakal', 700)" class="bg-blue-600 border-2 border-blue-500 py-3 rounded-xl font-black text-white shadow-md active:bg-blue-700 transition-colors italic">S+S</button>
        </div>

        <div class="bg-slate-100 p-3 rounded-3xl mb-3 shadow-inner border border-slate-200">
            <div class="flex gap-2 mb-2">
                <input type="text" id="h" placeholder="İşlem Adı" class="w-1/2 p-3 rounded-2xl border-none font-bold outline-none text-[9px] shadow-sm">
                <input type="number" id="t" placeholder="₺" class="w-1/2 p-3 rounded-2xl border-none font-black outline-none text-blue-600 text-base shadow-sm">
            </div>
            <div class="flex gap-2">
                <select id="y" class="w-full p-3 rounded-2xl bg-white font-black outline-none border border-slate-200 text-[9px] shadow-sm appearance-none text-center">
                    <option value="Nakit">NAKİT 💵</option><option value="Kart">KART 💳</option><option value="Iban">IBAN 🏦</option>
                </select>
                <button onclick="kaydet()" id="kayitBtn" class="bg-slate-900 text-white px-8 rounded-2xl font-black uppercase active:scale-95 transition-transform text-[9px]">KAYDET</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-3 text-[8px] font-black uppercase italic">
            <div class="bg-blue-50 p-2 rounded-xl border border-blue-100 text-center shadow-sm">NK: <span id="yNakit" class="text-blue-700">0</span></div>
            <div class="bg-orange-50 p-2 rounded-xl border border-orange-100 text-center shadow-sm">KR: <span id="yKart" class="text-orange-700">0</span></div>
            <div class="bg-purple-50 p-2 rounded-xl border border-purple-100 text-center shadow-sm">IB: <span id="yIban" class="text-purple-700">0</span></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-3 text-[7px]">
            <div class="bg-orange-50/50 p-2.5 rounded-2xl border border-orange-200 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 p-1 opacity-10"><i class="fa-solid fa-scissors text-xl"></i></div>
                <p class="font-black text-orange-600 uppercase text-center border-b border-orange-200 mb-2 italic">ERCAN %50</p>
                <div class="flex justify-between font-bold text-slate-500 mb-1">
                    <span>NK: <span id="eNakit">0</span></span><span>KR: <span id="eKart">0</span></span><span>IB: <span id="eIban">0</span></span>
                </div>
                <div class="flex justify-between items-center text-[9px] font-black text-orange-700 pt-1 border-t border-orange-200">
                    <span>İŞ: <span id="eToplamIs">0</span></span><span>PAY: <span id="pErcan">0</span>₺</span>
                </div>
            </div>
            <div class="bg-purple-50/50 p-2.5 rounded-2xl border border-purple-200 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 p-1 opacity-10"><i class="fa-solid fa-scissors text-xl"></i></div>
                <p class="font-black text-purple-600 uppercase text-center border-b border-purple-200 mb-2 italic">EFE %30</p>
                <div class="flex justify-between font-bold text-slate-500 mb-1">
                    <span>NK: <span id="fNakit">0</span></span><span>KR: <span id="fKart">0</span></span><span>IB: <span id="fIban">0</span></span>
                </div>
                <div class="flex justify-between items-center text-[9px] font-black text-purple-700 pt-1 border-t border-purple-200">
                    <span>İŞ: <span id="fToplamIs">0</span></span><span>PAY: <span id="pEfe">0</span>₺</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-4 rounded-3xl shadow-xl mb-3 border border-slate-700">
            <div class="flex justify-between items-center mb-1">
                <p class="text-[9px] font-bold text-slate-400 uppercase italic tracking-widest">GÜNLÜK NET KÂR</p>
                <p id="netKalan" class="text-2xl font-black text-emerald-400">0 ₺</p>
            </div>
            <div class="flex justify-between text-[8px] font-bold text-slate-500 border-t border-slate-800 pt-2">
                <span>TOPLAM CİRO: <span id="cToplam" class="text-white">0₺</span></span>
                <span>GİDER: <span id="gToplam" class="text-red-400">0₺</span></span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-2">
            <button onclick="kasaSifirla()" class="py-3 bg-emerald-600 text-white text-[10px] font-black rounded-2xl uppercase italic shadow-lg active:scale-95 transition-all">GÜNÜ KAPAT</button>
            <button onclick="document.getElementById('arsivModal').style.display='flex'" class="py-3 bg-slate-700 text-white text-[10px] font-black rounded-2xl uppercase italic shadow-lg active:scale-95 transition-all">GEÇMİŞE BAK</button>
        </div>

        <div onclick="raporUret()" class="bg-blue-600 text-white py-2 rounded-2xl text-center border-b-4 border-blue-800 cursor-pointer active:border-b-0 active:translate-y-1 transition-all">
            <h2 id="aylikCiro" class="text-sm font-black italic tracking-tighter">0 ₺</h2>
            <p class="text-[6px] font-bold uppercase opacity-80 italic">AYLIK GENEL TOPLAM</p>
        </div>
    </div>

    <script>
        // FIREBASE KURULUMU
        const firebaseConfig = { apiKey: "AIzaSyDpT9QsG7V23KtKZMVXmIfeX_Mg-eAeBZM", databaseURL: "https://berberkasa-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "berberkasa" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let p = 'ahmet'; let hesaplanmisNet = 0; let sonKasaVerisi = null;
        const simdi = new Date();
        const ayID = simdi.getFullYear() + "-" + (simdi.getMonth() + 1);
        document.getElementById('bugunTarih').innerText = simdi.toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

        function pSec(sec) { p = sec; document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-p')); document.getElementById('btn' + sec).classList.add('active-p'); }
        function hizliDoldur(islem, fiyat) { document.getElementById('h').value = islem; document.getElementById('t').value = fiyat; }
        
        function kaydet() {
            const h = document.getElementById('h').value; const t = parseFloat(document.getElementById('t').value); const y = document.getElementById('y').value;
            if(!h || isNaN(t)) return;
            db.ref('kasa/').push({ h, t, y, p, saat: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}) });
            document.getElementById('h').value = ''; document.getElementById('t').value = '';
        }

        // VERESİYE VE GİDER İŞLEMLERİ
        function veresiyeEkle() { const m = document.getElementById('vMusteri').value; const t = parseFloat(document.getElementById('vTutar').value); if(!m || isNaN(t)) return; db.ref('veresiye/').push({ m, t, tarih: new Date().toLocaleDateString('tr-TR') }); document.getElementById('vMusteri').value = ''; document.getElementById('vTutar').value = ''; }
        function veresiyeListele() { const ara = document.getElementById('vAra').value.toLowerCase(); db.ref('veresiye/').on('value', (snap) => { const liste = document.getElementById('veresiyeListesi'); liste.innerHTML = ""; if(snap.val()) { Object.keys(snap.val()).forEach(key => { const v = snap.val()[key]; if(v.m.toLowerCase().includes(ara)) { liste.innerHTML += `<div class="flex justify-between items-center p-2 bg-slate-50 border rounded-lg mb-1"><div class="flex flex-col"><span class="font-black text-blue-900 uppercase">${v.m}</span><span class="text-[7px] text-slate-400">${v.tarih}</span></div><div class="flex items-center gap-2"><span class="font-black text-blue-600">${v.t} ₺</span><button onclick="veresiyeTahsilEt('${key}', '${v.m}', ${v.t})" class="bg-emerald-500 text-white px-2 py-1 rounded text-[8px] font-bold uppercase">ALINDI</button></div></div>`; } }); } }); }
        function veresiyeTahsilEt(id, musteri, tutar) { if(confirm(musteri + " tahsil edilsin mi?")) { db.ref('kasa/').push({ h: musteri + " (Veresiye)", t: tutar, y: 'Nakit', p: 'ahmet', saat: 'Tahsilat' }); db.ref('veresiye/' + id).remove(); } }
        function giderPanelEkle() { const ad = document.getElementById('gAd').value; const t = parseFloat(document.getElementById('gTutar').value); if(!ad || isNaN(t)) return; db.ref('kasa/').push({ h: ad, t: t, y: 'Nakit', p: 'Gider', saat: 'Masraf' }); document.getElementById('gAd').value = ''; document.getElementById('gTutar').value = ''; }
        function giderPanelListele() { const ara = document.getElementById('gAra').value.toLowerCase(); db.ref('kasa/').on('value', (snap) => { const liste = document.getElementById('giderPanelListesi'); liste.innerHTML = ""; if(snap.val()) { Object.keys(snap.val()).forEach(key => { const v = snap.val()[key]; if(v.p === 'Gider' && v.h.toLowerCase().includes(ara)) { liste.innerHTML += `<div class="flex justify-between items-center p-2 bg-red-50 border border-red-100 rounded-lg mb-1"><span><b>${v.h.toUpperCase()}</b></span><span class="font-black text-red-600">${v.t} ₺</span></div>`; } }); } }); }
        veresiyeListele(); giderPanelListele();

        // ANA VERİ DÖNGÜSÜ
        db.ref('kasa/').on('value', (snapshot) => {
            const veriler = snapshot.val(); sonKasaVerisi = veriler;
            const ustaPanelleri = { ahmet: 'listeAhmet', Ercan: 'listeErcan', Efe: 'listeEfe', Turancan: 'listeTurancan', Bekir: 'listeBekir', Gider: 'listeGider' };
            Object.values(ustaPanelleri).forEach(id => document.getElementById(id).innerHTML = "");

            let tC=0, gT=0; let yOzet = { Nakit:0, Kart:0, Iban:0 };
            let uDetay = { Ercan: { Nakit:0, Kart:0, Iban:0, Toplam:0 }, Efe: { Nakit:0, Kart:0, Iban:0, Toplam:0 } };
            
            if (veriler) {
                Object.keys(veriler).reverse().forEach(key => {
                    const v = veriler[key]; const t = parseFloat(v.t);
                    const panelId = ustaPanelleri[v.p];
                    
                    if(panelId) {
                        const row = document.createElement('div');
                        row.className = "flex justify-between items-center py-1.5";
                        row.innerHTML = `<span>${v.h}</span><div class="flex items-center"><b class="text-blue-700">${t}₺</b><button onclick="kayitSil('${key}')" class="sil-btn">×</button></div>`;
                        document.getElementById(panelId).appendChild(row);
                    }

                    if (v.h.includes('Ödeme') || v.p === 'Gider') { gT += t; } 
                    else { 
                        tC += t; 
                        if(yOzet[v.y] !== undefined) yOzet[v.y] += t;
                        if(uDetay[v.p]) { uDetay[v.p][v.y] += t; uDetay[v.p].Toplam += t; }
                    }
                });
            }

            // Boş paneller için mesaj
            Object.values(ustaPanelleri).forEach(id => { if(!document.getElementById(id).innerHTML) document.getElementById(id).innerHTML = "<p class='text-slate-300 py-3 text-center'>İşlem yok</p>"; });

            const eP = Math.floor(uDetay.Ercan.Toplam * 0.5); const fP = Math.floor(uDetay.Efe.Toplam * 0.3);
            hesaplanmisNet = Math.floor(tC - (eP + fP + gT));

            ['Nakit','Kart','Iban'].forEach(m => { 
                if(uDetay.Ercan[m] !== undefined) document.getElementById('e'+m).innerText = uDetay.Ercan[m]; 
                if(uDetay.Efe[m] !== undefined) document.getElementById('f'+m).innerText = uDetay.Efe[m]; 
                document.getElementById('y'+m).innerText = yOzet[m];
            });
            document.getElementById('eToplamIs').innerText = uDetay.Ercan.Toplam;
            document.getElementById('fToplamIs').innerText = uDetay.Efe.Toplam;
            document.getElementById('pErcan').innerText = eP;
            document.getElementById('pEfe').innerText = fP;
            document.getElementById('cToplam').innerText = tC + " ₺";
            document.getElementById('gToplam').innerText = gT + " ₺";
            document.getElementById('netKalan').innerText = hesaplanmisNet + " ₺";
        });

        // ARŞİV VE RAPORLAMA
        function arsivGetir(tarih) {
            const sonucDiv = document.getElementById('arsivSonuc');
            sonucDiv.innerHTML = "<p class='text-center py-4'>Yükleniyor...</p>";
            db.ref('arsiv/' + tarih).once('value', (snap) => {
                const vls = snap.val();
                if(!vls) { sonucDiv.innerHTML = "<p class='text-center text-red-500 font-bold py-4 italic'>Kayıt Bulunamadı.</p>"; return; }
                let htm = `<div class="space-y-1">`;
                let oz = {ahmet:0, Ercan:0, Efe:0, Gider:0, Top:0};
                Object.values(vls).forEach(v => {
                    const t = parseFloat(v.t);
                    htm += `<div class="flex justify-between border-b pb-0.5 text-[7px]"><span>${v.p.toUpperCase()}: ${v.h}</span><b>${t}₺</b></div>`;
                    if(v.p === 'Gider' || v.h.includes('Ödeme')) oz.Gider += t; else { oz.Top += t; if(oz.hasOwnProperty(v.p)) oz[v.p] += t; }
                });
                const ep = Math.floor(oz.Ercan * 0.5); const fp = Math.floor(oz.Efe * 0.3);
                htm += `</div><div class="mt-3 p-3 bg-slate-100 rounded-2xl font-black text-[8px] space-y-1">
                    <div class="flex justify-between text-blue-700"><span>Ahmet:</span><span>${oz.ahmet}₺</span></div>
                    <div class="flex justify-between text-orange-700"><span>Ercan Payı:</span><span>${ep}₺</span></div>
                    <div class="flex justify-between text-purple-700"><span>Efe Payı:</span><span>${fp}₺</span></div>
                    <div class="flex justify-between text-red-700 border-t pt-1"><span>Gider:</span><span>${oz.Gider}₺</span></div>
                    <div class="flex justify-between text-emerald-700 border-t pt-1 text-[10px] uppercase italic"><span>NET KÂR:</span><span>${Math.floor(oz.Top - (ep + fp + oz.Gider))}₺</span></div>
                </div>`;
                sonucDiv.innerHTML = htm;
            });
        }

        function kasaSifirla() {
            if(confirm("Günü kapatıyorsun abi? Tüm veriler arşive taşınacak.")) {
                const bugunKey = new Date().toISOString().split('T')[0];
                db.ref('aylikNet/' + ayID).transaction(curr => (curr || 0) + hesaplanmisNet);
                db.ref('kasa/').once('value', (snap) => {
                    if(snap.val()) {
                        db.ref('arsiv/' + bugunKey).set(snap.val(), (err) => {
                            if(!err) { db.ref('kasa/').remove(); alert("Başarıyla arşivlendi!"); }
                        });
                    } else { alert("İşlem yok!"); }
                });
            }
        }

        function raporUret() {
            if(!sonKasaVerisi) return;
            let r = { ahmet:0, Ercan:0, Efe:0, Gider:0, Ciro:0 }; let listHTML = "";
            Object.values(sonKasaVerisi).forEach(v => {
                const t = parseFloat(v.t);
                listHTML += `<div class="flex justify-between border-b pb-1 text-[7px]"><span>${v.p.toUpperCase()}: ${v.h}</span><span>${t} ₺</span></div>`;
                if(v.h.includes('Ödeme') || v.p === 'Gider') { r.Gider += t; } else { r.Ciro += t; if(r.hasOwnProperty(v.p)) r[v.p] += t; }
            });
            const eP = Math.floor(r.Ercan * 0.5); const fP = Math.floor(r.Efe * 0.3);
            document.getElementById('raporData').innerHTML = `
                <div class="text-center font-black border-b pb-2 text-[10px] uppercase">GÜNLÜK ÖZET</div>
                <div class="space-y-1">${listHTML}</div>
                <div class="bg-slate-100 p-3 rounded-2xl font-bold text-[8px] space-y-1">
                    <div class="flex justify-between text-blue-800"><span>TOPLAM CİRO:</span><span>${r.Ciro} ₺</span></div>
                    <div class="flex justify-between text-red-600"><span>TOPLAM GİDER:</span><span>${r.Gider} ₺</span></div>
                    <div class="flex justify-between border-t pt-1 text-sm font-black text-emerald-600 uppercase italic text-center"><span>NET: ${Math.floor(r.Ciro - (eP + fP + r.Gider))} ₺</span></div>
                </div>`;
            document.getElementById('raporModal').style.display = 'flex';
        }

        function kayitSil(id) { if(confirm("İşlemi iptal ediyorsun abi?")) db.ref('kasa/' + id).remove(); }
        db.ref('aylikNet/' + ayID).on('value', (snapshot) => { document.getElementById('aylikCiro').innerText = Math.floor(snapshot.val() || 0).toLocaleString('tr-TR') + " ₺"; });
    </script>
</body>
</html>
