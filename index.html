<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli KASA - V40 Kurtarma</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .p-btn { transition: all 0.2s; border: 2px solid transparent; background-color: #f8fafc; color: #64748b; }
        .active-p { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 900 !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 15px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-icerik { background: white; width: 100%; max-width: 450px; border-radius: 2.5rem; padding: 25px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 p-2 text-slate-900 text-[10px]">

    <div id="raporModal" class="modal-overlay">
        <div class="modal-icerik shadow-2xl border border-slate-200">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-black text-blue-800 italic uppercase">Arşiv & Geçmiş Raporlar</h2>
                <button onclick="document.getElementById('raporModal').style.display='none'" class="text-red-500 font-black">KAPAT</button>
            </div>
            <div class="mb-4">
                <p class="text-[8px] font-bold text-slate-500 mb-1 uppercase">Tarih Seçin:</p>
                <input type="date" id="arsivTarih" onchange="arsivGetir(this.value)" class="w-full p-3 bg-slate-100 rounded-xl font-bold border-2 border-slate-200">
            </div>
            <div id="raporData" class="space-y-4">
                <p class="text-center py-10 text-slate-400 font-bold uppercase italic">Lütfen bir tarih seçin veya "Rapor Üret"e basın.</p>
            </div>
        </div>
    </div>

    <div id="personelTakipModal" class="modal-overlay"><div class="modal-icerik"><div class="flex justify-between border-b pb-2 mb-4"><h2 id="pTakipIsim" class="font-black text-blue-800 italic">PANEL</h2><button onclick="document.getElementById('personelTakipModal').style.display='none'" class="text-red-500 font-black uppercase">Kapat</button></div><div id="pTakipOzet" class="mb-4"></div><div id="pTakipListe" class="space-y-1"></div></div></div>
    <div id="veresiyeModal" class="modal-overlay"><div class="modal-icerik"><div class="flex justify-between border-b pb-2 mb-4"><h2 class="font-black text-blue-800 italic uppercase">VERESİYE</h2><button onclick="document.getElementById('veresiyeModal').style.display='none'" class="text-red-500 font-black">Kapat</button></div><div class="bg-blue-50 p-3 rounded-xl mb-3"><input type="text" id="vMusteri" placeholder="Müşteri Adı" class="w-full p-2 mb-2 rounded-lg border-none"><div class="flex gap-1"><input type="number" id="vTutar" placeholder="₺ Borç" class="w-1/2 p-2 rounded-lg border-none"><button onclick="veresiyeEkle()" class="w-1/2 bg-blue-600 text-white rounded-lg font-black uppercase text-[9px]">Yaz</button></div></div><div id="veresiyeListesi"></div></div></div>
    <div id="giderModal" class="modal-overlay"><div class="modal-icerik"><div class="flex justify-between border-b pb-2 mb-4"><h2 class="font-black text-red-800 italic uppercase">GİDERLER</h2><button onclick="document.getElementById('giderModal').style.display='none'" class="text-red-500 font-black">Kapat</button></div><div class="bg-red-50 p-3 rounded-xl mb-3"><input type="text" id="gAd" placeholder="Gider Adı" class="w-full p-2 mb-2 rounded-lg border-none"><div class="flex gap-1"><input type="number" id="gTutar" placeholder="₺" class="w-1/2 p-2 rounded-lg border-none"><button onclick="giderPanelEkle()" class="w-1/2 bg-red-600 text-white rounded-lg font-bold uppercase text-[9px]">Ekle</button></div></div><div id="giderPanelListesi"></div></div></div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-4 min-h-[95vh] flex flex-col border border-slate-100">
        <div class="flex justify-between items-center mb-4 px-1">
            <button onclick="document.getElementById('veresiyeModal').style.display='flex'" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-full font-black text-[8px] uppercase italic">VERESİYE</button>
            <div class="text-center"><h1 class="text-lg font-black text-slate-900 tracking-tighter uppercase italic">AHMET TEKELİ KASA</h1><p id="bugunTarih" class="text-[7px] font-bold text-blue-600 tracking-widest uppercase mt-1 italic"></p></div>
            <button onclick="document.getElementById('giderModal').style.display='flex'" class="bg-red-100 text-red-700 px-3 py-1.5 rounded-full font-black text-[8px] uppercase italic">GİDERLER</button>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-1.5">
            <button onclick="pSec('ahmet')" id="btnahmet" class="p-btn active-p p-3 rounded-2xl font-black uppercase flex flex-col items-center gap-1"><i class="fa-solid fa-user-tie text-blue-600"></i><span>AHMET</span></button>
            <button onclick="pSec('Ercan')" id="btnErcan" class="p-btn p-3 rounded-2xl font-black uppercase text-orange-600 flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-orange-500"></i><span>ERCAN</span></button>
            <button onclick="pSec('Efe')" id="btnEfe" class="p-btn p-3 rounded-2xl font-black uppercase text-purple-600 flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-purple-500"></i><span>EFE</span></button>
        </div>
        <div class="grid grid-cols-2 gap-1.5 mb-3">
            <button onclick="pSec('Turancan')" id="btnTurancan" class="p-btn p-3 rounded-2xl font-black uppercase text-[9px]">TURANCAN</button>
            <button onclick="pSec('Bekir')" id="btnBekir" class="p-btn p-3 rounded-2xl font-black uppercase text-[9px]">BEKİR</button>
        </div>

        <div class="grid grid-cols-4 gap-1.5 mb-3">
            <button onclick="hizliDoldur('Saç', 500)" class="bg-white border py-3 rounded-xl font-bold">SAÇ</button>
            <button onclick="hizliDoldur('Sakal', 250)" class="bg-white border py-3 rounded-xl font-bold">SAKAL</button>
            <button onclick="hizliDoldur('Çocuk Saç', 450)" class="bg-white border py-3 rounded-xl font-bold">ÇOCUK</button>
            <button onclick="hizliDoldur('Saç Sakal', 700)" class="bg-blue-50 border-blue-200 border py-3 rounded-xl font-black text-blue-700">S+S</button>
        </div>

        <div class="bg-slate-100 p-4 rounded-3xl mb-4 shadow-inner border border-slate-200">
            <div class="flex gap-2 mb-2"><input type="text" id="h" placeholder="İşlem / Maaş / Avans" class="w-1/2 p-3 rounded-xl border-none font-bold text-[11px]"><input type="number" id="t" placeholder="₺" class="w-1/2 p-3 rounded-xl border-none font-black text-blue-600 text-lg"></div>
            <div class="flex gap-2"><select id="y" class="w-full p-3 rounded-xl bg-white font-black text-[11px]"><option value="Nakit">NAKİT</option><option value="Kart">KART</option><option value="Iban">IBAN</option></select><button onclick="kaydet()" class="bg-slate-800 text-white px-8 rounded-xl font-black uppercase text-[11px]">KAYDET</button></div>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-3 text-center text-[10px] font-black uppercase italic">
            <div class="bg-blue-50 p-3 rounded-2xl border-2 border-blue-100 text-blue-700">NAKİT<br><span id="yNakit" class="text-sm">0</span></div>
            <div class="bg-orange-50 p-3 rounded-2xl border-2 border-orange-100 text-orange-700">KART<br><span id="yKart" class="text-sm">0</span></div>
            <div class="bg-purple-50 p-3 rounded-2xl border-2 border-purple-100 text-purple-700">IBAN<br><span id="yIban" class="text-sm">0</span></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-orange-50 p-4 rounded-3xl border-2 border-orange-200 text-center" onclick="pPanelAc('Ercan')"><p class="font-black text-orange-800 uppercase border-b mb-2 text-xs italic">ERCAN (%50)</p><div class="font-black text-xs">İŞ: <span id="eToplamIs">0</span> | PAY: <span id="pErcan">0</span></div></div>
            <div class="bg-purple-50 p-4 rounded-3xl border-2 border-purple-200 text-center" onclick="pPanelAc('Efe')"><p class="font-black text-purple-800 uppercase border-b mb-2 text-xs italic">EFE (%30)</p><div class="font-black text-xs">İŞ: <span id="fToplamIs">0</span> | PAY: <span id="fPay">0</span></div></div>
        </div>

        <div class="bg-slate-900 text-white p-4 rounded-3xl shadow-xl mb-4 mt-auto">
            <div class="flex justify-between items-center mb-1"><p class="text-[10px] font-black text-slate-400 uppercase italic">GÜNLÜK NET KÂR</p><p id="netKalan" class="text-3xl font-black text-emerald-400">0 ₺</p></div>
            <div class="flex justify-between text-[11px] font-black border-t border-white/20 pt-2 uppercase"><span class="text-slate-200">CİRO: <span id="cToplam" class="text-white">0₺</span></span><span class="text-red-400">GİDER: <span id="gToplam" class="text-red-400">0₺</span></span></div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="kasaSifirla()" class="py-4 bg-emerald-600 text-white text-[11px] font-black rounded-2xl uppercase italic">GÜNÜ KAPAT</button>
            <button onclick="aySifirla()" class="py-4 bg-red-600 text-white text-[11px] font-black rounded-2xl uppercase italic">AYI SIFIRLA</button>
        </div>

        <div onclick="raporUret()" class="mt-3 bg-blue-600 text-white py-2.5 rounded-2xl text-center shadow-md cursor-pointer border-2 border-blue-400">
            <h2 id="aylikCiro" class="text-lg font-black italic">0 ₺</h2>
            <p class="text-[8px] font-bold uppercase opacity-80 mt-0.5 italic">ARŞİV VE RAPORLAR</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDpT9QsG7V23KtKZMVXmIfeX_Mg-eAeBZM", databaseURL: "https://berberkasa-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "berberkasa" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        let p = 'ahmet'; let sonKasaVerisi = null; let hesaplanmisNet = 0;
        const simdi = new Date(); const ayID = simdi.getFullYear() + "-" + (simdi.getMonth() + 1); const gunID = simdi.toISOString().split('T')[0];
        document.getElementById('bugunTarih').innerText = simdi.toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

        function pSec(sec) { p = sec; document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-p')); document.getElementById('btn' + sec).classList.add('active-p'); }
        function hizliDoldur(is, f) { document.getElementById('h').value = is; document.getElementById('t').value = f; }
        
        function kaydet() {
            const h = document.getElementById('h').value; const t = parseFloat(document.getElementById('t').value); const y = document.getElementById('y').value;
            if(!h || isNaN(t)) return;
            const isMaas = h.toLowerCase().includes('maa') || h.toLowerCase().includes('avan');
            db.ref('kasa/').push({ h, t, y, p, saat: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}), maasMi: isMaas });
            document.getElementById('h').value = ''; document.getElementById('t').value = '';
        }

        // RAPORLARI GETİREN KRİTİK FONKSİYON (GÜNCELLENDİ)
        async function arsivGetir(tarih) {
            if(!tarih) return;
            const raporAlani = document.getElementById('raporData');
            raporAlani.innerHTML = "<p class='text-center py-5 font-bold animate-pulse uppercase'>Veriler yükleniyor...</p>";

            try {
                // Önce kasada mı yoksa arşivde mi kontrol et
                let veri;
                if(tarih === gunID) {
                    veri = sonKasaVerisi;
                } else {
                    const snap = await db.ref('arsiv/' + tarih).once('value');
                    veri = snap.val();
                }
                raporOlustur(veri, tarih);
            } catch (e) {
                raporAlani.innerHTML = "<p class='text-red-500 font-bold'>Hata oluştu!</p>";
            }
        }

        function raporUret() { 
            const tarihInput = document.getElementById('arsivTarih');
            tarihInput.value = gunID; 
            document.getElementById('raporModal').style.display = 'flex';
            arsivGetir(gunID); 
        }

        function raporOlustur(v, t) {
            const alan = document.getElementById('raporData');
            if(!v) {
                alan.innerHTML = `<div class="bg-slate-100 p-5 rounded-2xl text-center"><p class="font-black text-slate-400 uppercase italic">${t} tarihinde kayıt bulunamadı.</p></div>`;
                return;
            }

            let gruplar = {};
            let gunlukCiro = 0;
            let gunlukGider = 0;

            // Veriyi işle (Hem Firebase anahtarlarıyla hem de liste halindeki veriyi destekler)
            Object.values(v).forEach(item => {
                if(!gruplar[item.p]) gruplar[item.p] = { t: 0, l: "" };
                const tutar = parseFloat(item.t);
                gruplar[item.p].t += tutar;
                gruplar[item.p].l += `<div class="flex justify-between border-b border-slate-100 py-2 text-[9px] font-bold"><span>${item.saat} | ${item.h}</span><span class="text-blue-600">${tutar} ₺</span></div>`;
                
                if(item.p === 'Gider' || item.maasMi) gunlukGider += tutar;
                else gunlukCiro += tutar;
            });

            let html = `<div class="bg-slate-800 text-white p-4 rounded-2xl mb-4 text-center">
                            <h3 class="font-black italic uppercase text-xs mb-2">${t} ÖZETİ</h3>
                            <div class="flex justify-between font-black text-[10px] border-t border-white/20 pt-2">
                                <span>CİRO: ${gunlukCiro} ₺</span>
                                <span class="text-red-400">GİDER: ${gunlukGider} ₺</span>
                            </div>
                        </div>`;

            Object.keys(gruplar).forEach(pIsim => {
                html += `<div class="border-2 border-slate-100 rounded-2xl overflow-hidden mb-3">
                            <div class="bg-slate-100 p-2 flex justify-between font-black uppercase italic text-blue-800">
                                <span>${pIsim}</span><span>${gruplar[pIsim].t} ₺</span>
                            </div>
                            <div class="p-2 bg-white">${gruplar[pIsim].l}</div>
                         </div>`;
            });
            alan.innerHTML = html;
        }

        // DİĞER FONKSİYONLAR (VERESİYE, GİDER VS.)
        function veresiyeEkle() { const m = document.getElementById('vMusteri').value; const t = parseFloat(document.getElementById('vTutar').value); if(!m || isNaN(t)) return; db.ref('veresiye/').push({ m, t, tarih: new Date().toLocaleDateString('tr-TR') }); document.getElementById('vMusteri').value = ''; document.getElementById('vTutar').value = ''; }
        db.ref('veresiye/').on('value', (snap) => { const liste = document.getElementById('veresiyeListesi'); if(!liste) return; liste.innerHTML = ""; const veriler = snap.val(); if(veriler) { Object.keys(veriler).forEach(k => { const v = veriler[k]; liste.innerHTML += `<div class="flex justify-between items-center p-3 bg-white border rounded-xl mb-1 shadow-sm"><span class="font-black uppercase">${v.m}</span><div class="flex items-center gap-2"><span class="font-black text-blue-600">${v.t} ₺</span><button onclick="veresiyeAl('${k}', '${v.m}', ${v.t})" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase">ALINDI</button></div></div>`; }); } else { liste.innerHTML = "<p class='text-center py-5 opacity-50 font-bold'>Veresiye yok.</p>"; } });
        function veresiyeAl(id, m, t) { if(confirm(m + " borcunu tahsil ettin mi abi?")) { db.ref('kasa/').push({ h: m + " (Veresiye Tahsilat)", t: t, y: 'Nakit', p: 'ahmet', saat: 'Tahsilat' }); db.ref('veresiye/' + id).remove(); } }
        function pPanelAc(isim) { if(!sonKasaVerisi) return; let pData = { n:0, k:0, i:0, odeme:0, liste: "" }; const maasli = (isim === 'Turancan' || isim === 'Bekir'); Object.keys(sonKasaVerisi).forEach(k => { const v = sonKasaVerisi[k]; if(v.p === isim) { const t = parseFloat(v.t); if(maasli) { if(v.maasMi) { pData.odeme += t; pData.liste += listeSatiri(v, t, k); } } else { if(v.y === 'Nakit') pData.n += t; if(v.y === 'Kart') pData.k += t; if(v.y === 'Iban') pData.i += t; pData.liste += listeSatiri(v, t, k); } } }); document.getElementById('pTakipIsim').innerText = isim + " PANELİ"; document.getElementById('pTakipOzet').innerHTML = maasli ? `<div class="bg-emerald-50 p-2 rounded-lg font-black text-emerald-700 text-center uppercase">MAAŞ/AVANS: ${pData.odeme} ₺</div>` : `<div class="grid grid-cols-3 gap-2 text-center font-black"><div class="bg-blue-50 p-1 rounded">N:${pData.n}</div><div class="bg-orange-50 p-1 rounded">K:${pData.k}</div><div class="bg-purple-50 p-1 rounded">I:${pData.i}</div></div>`; document.getElementById('pTakipListe').innerHTML = pData.liste || "<p class='text-center py-5 opacity-50 font-bold uppercase'>Kayıt yok.</p>"; document.getElementById('personelTakipModal').style.display = 'flex'; }
        function listeSatiri(v, t, k) { return `<div class="flex justify-between items-center border-b py-3 font-bold"><span>${v.saat} | ${v.h}</span><div class="flex items-center gap-3"><span>${t} ₺</span><button onclick="kayitSil('${k}')" class="text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button></div></div>`; }
        function kayitSil(id) { if(confirm("Sileyim mi abi?")) { db.ref('kasa/' + id).remove(); document.getElementById('personelTakipModal').style.display = 'none'; } }
        function giderPanelEkle() { const a = document.getElementById('gAd').value; const t = parseFloat(document.getElementById('gTutar').value); if(!a || isNaN(t)) return; db.ref('kasa/').push({ h: a, t, y: 'Nakit', p: 'Gider', saat: 'Masraf' }); document.getElementById('gAd').value = ''; document.getElementById('gTutar').value = ''; }

        db.ref('kasa/').on('value', (snap) => {
            const veriler = snap.val(); sonKasaVerisi = veriler;
            let tC=0, gT=0, yOzet = { Nakit:0, Kart:0, Iban:0 }; let pOzet = { Ercan: 0, Efe: 0 };
            const gListe = document.getElementById('giderPanelListesi'); gListe.innerHTML = "";
            if (veriler) {
                Object.keys(veriler).forEach(k => {
                    const v = veriler[k]; const t = parseFloat(v.t);
                    if (v.p === 'Gider' || v.maasMi) { gT += t; const gIsim = v.maasMi ? `${v.p} (${v.h})` : v.h; gListe.innerHTML += `<div class="flex justify-between bg-white p-2 rounded-lg border mb-1 font-bold"><span>${gIsim}</span><span>${t} ₺ <button onclick="kayitSil('${k}')" class="text-red-500 ml-1">X</button></span></div>`; } 
                    else { tC += t; yOzet[v.y] += t; if(v.p === 'Ercan') pOzet.Ercan += t; if(v.p === 'Efe') pOzet.Efe += t; }
                });
            }
            const eP = Math.floor(pOzet.Ercan * 0.5); const fP = Math.floor(pOzet.Efe * 0.3);
            hesaplanmisNet = Math.floor(tC - (eP + fP + gT));
            document.getElementById('yNakit').innerText = yOzet.Nakit; document.getElementById('yKart').innerText = yOzet.Kart; document.getElementById('yIban').innerText = yOzet.Iban;
            document.getElementById('eToplamIs').innerText = pOzet.Ercan; document.getElementById('pErcan').innerText = eP;
            document.getElementById('fToplamIs').innerText = pOzet.Efe; document.getElementById('fPay').innerText = fP;
            document.getElementById('cToplam').innerText = tC + " ₺"; document.getElementById('gToplam').innerText = gT + " ₺";
            document.getElementById('netKalan').innerText = hesaplanmisNet + " ₺";
        });

        db.ref('aylikNet/' + ayID).on('value', (s) => { document.getElementById('aylikCiro').innerText = (s.val() || 0).toLocaleString('tr-TR') + " ₺"; });
        async function kasaSifirla() { if(confirm("Günü kapatıyorum abi?")) { const snap = await db.ref('kasa/').once('value'); const v = snap.val(); if(v) { await db.ref('arsiv/' + gunID).set(v); await db.ref('aylikNet/' + ayID).transaction(c => (c || 0) + hesaplanmisNet); await db.ref('kasa/').remove(); alert("Başarıyla arşivlendi abi."); } else { alert("Kayıt yok."); } } }
        function aySifirla() { if(confirm("Ayı sıfırlıyorum?")) { db.ref('aylikNet/' + ayID).set(0); } }
    </script>
</body>
</html>
