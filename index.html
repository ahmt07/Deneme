<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli | Premium Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=2074&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; color: #e5e7eb;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%); color: #000; font-weight: 800; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #d4af37; }
        .time-slot { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; text-align: center; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .time-slot:hover { background: rgba(212, 175, 55, 0.2); }
        .peer-checked + .time-slot { background: #d4af37; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState(sessionStorage.getItem('is_admin') === 'true' ? 'admin' : 'customer');
            const [adminTab, setAdminTab] = useState('randevular');
            
            // --- DATA STATE ---
            const [randevular, setRandevular] = useState([]);
            const [hizmetler, setHizmetler] = useState([
                { id: 1, ad: 'Saç Kesimi', fiyat: 300 },
                { id: 2, ad: 'Sakal Tasarımı', fiyat: 150 }
            ]);
            const [berberler, setBerberler] = useState([
                { id: 1, ad: 'Ahmet Tekeli' }
            ]);

            // 30 Dakikalık İşlem Saatleri (09:00 - 20:00)
            const mesaiSaatleri = [];
            for(let h=9; h<20; h++) {
                mesaiSaatleri.push(`${h.toString().padStart(2, '0')}:00`);
                mesaiSaatleri.push(`${h.toString().padStart(2, '0')}:30`);
            }

            // Verileri Yükle/Kaydet
            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('barber_v5_data')) || {};
                if(saved.randevular) setRandevular(saved.randevular);
                if(saved.hizmetler) setHizmetler(saved.hizmetler);
                if(saved.berberler) setBerberler(saved.berberler);
            }, []);

            useEffect(() => {
                localStorage.setItem('barber_v5_data', JSON.stringify({ randevular, hizmetler, berberler }));
            }, [randevular, hizmetler, berberler]);

            // --- ADMIN AKSİYONLARI ---
            const adminGiris = () => {
                if(view === 'admin') { sessionStorage.removeItem('is_admin'); setView('customer'); }
                else { if(prompt("Yönetici Şifresi:") === "1923") { sessionStorage.setItem('is_admin', 'true'); setView('admin'); } }
            };

            const hizmetEkle = () => {
                const ad = prompt("Hizmet Adı:");
                const fiyat = prompt("Fiyatı (₺):");
                if(ad && fiyat) setHizmetler([...hizmetler, { id: Date.now(), ad, fiyat: parseInt(fiyat) }]);
            };

            const berberEkle = () => {
                const ad = prompt("Berber Adı Soyadı:");
                if(ad) setBerberler([...berberler, { id: Date.now(), ad }]);
            };

            const molaVer = (tarih, saat, berber) => {
                setRandevular([...randevular, { id: Date.now(), ad: 'MOLA/KAPALI', tel: '-', berber, hizmet: 'MOLA', tarih, saat, tip: 'mola' }]);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Üst Menü */}
                    <div className="flex justify-between items-center max-w-5xl mx-auto mb-8">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 gold-btn rounded-full flex items-center justify-center shadow-lg shadow-yellow-600/20">A</div>
                            <h1 className="text-xl font-black italic text-yellow-500 uppercase tracking-tighter">Ahmet Tekeli</h1>
                        </div>
                        <button onClick={adminGiris} className="glass px-5 py-2 text-[10px] font-bold uppercase tracking-widest border border-white/10 hover:bg-white/5">
                            {view === 'admin' ? 'Dükkana Dön' : 'Yönetim Paneli'}
                        </button>
                    </div>

                    {view === 'customer' ? (
                        /* ================= MÜŞTERİ MODU ================= */
                        <div className="max-w-md mx-auto animate-in fade-in">
                            <div className="glass p-8 shadow-2xl">
                                <h2 className="text-xl font-black mb-6 text-center italic tracking-widest underline decoration-yellow-600">RANDEVU FORMU</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    setRandevular([...randevular, { id: Date.now(), ad: fd.get('ad'), tel: fd.get('tel'), berber: fd.get('berber'), hizmet: fd.get('hizmet'), tarih: fd.get('tarih'), saat: fd.get('saat'), tip: 'musteri' }]);
                                    alert("Randevunuz başarıyla oluşturuldu!"); e.target.reset();
                                }} className="space-y-4">
                                    <input name="ad" placeholder="Adınız Soyadınız" className="input-field" required />
                                    <input name="tel" placeholder="Telefon (05xx)" type="tel" className="input-field" required />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select name="berber" className="input-field text-sm" required>
                                            <option value="">Berber Seçin</option>
                                            {berberler.map(b => <option key={b.id} value={b.ad}>{b.ad}</option>)}
                                        </select>
                                        <select name="hizmet" className="input-field text-sm" required>
                                            <option value="">Hizmet Seçin</option>
                                            {hizmetler.map(h => <option key={h.id} value={h.ad}>{h.ad} ({h.fiyat}₺)</option>)}
                                        </select>
                                    </div>
                                    <input name="tarih" type="date" className="input-field" required />
                                    
                                    <div className="mt-4">
                                        <p className="text-[10px] text-gray-400 mb-2 uppercase font-bold tracking-widest">Saat Seçimi (30 Dakikalık İşlemler)</p>
                                        <div className="grid grid-cols-4 gap-2">
                                            {mesaiSaatleri.map(s => (
                                                <label key={s} className="cursor-pointer">
                                                    <input type="radio" name="saat" value={s} className="hidden peer" required />
                                                    <div className="time-slot">{s}</div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <button className="gold-btn w-full p-4 rounded-2xl shadow-xl active:scale-95 transition mt-4 uppercase text-xs">Randevuyu Onayla</button>
                                </form>
                            </div>
                        </div>
                    ) : (
                        /* ================= ADMİN MODU ================= */
                        <div className="max-w-5xl mx-auto space-y-6">
                            <div className="flex gap-2 overflow-x-auto pb-2">
                                <button onClick={()=>setAdminTab('randevular')} className={`px-6 py-2 rounded-full text-[10px] font-bold uppercase ${adminTab === 'randevular' ? 'gold-btn' : 'glass'}`}>Randevular</button>
                                <button onClick={()=>setAdminTab('ayarlar')} className={`px-6 py-2 rounded-full text-[10px] font-bold uppercase ${adminTab === 'ayarlar' ? 'gold-btn' : 'glass'}`}>Hizmet & Berber</button>
                            </div>

                            {adminTab === 'randevular' && (
                                <div className="grid md:grid-cols-2 gap-4">
                                    {randevular.length === 0 && <p className="text-gray-500 italic text-sm">Bekleyen randevu yok...</p>}
                                    {randevular.map(r => (
                                        <div key={r.id} className={`glass p-5 flex justify-between items-center border-l-4 ${r.tip === 'mola' ? 'border-red-600 opacity-60' : 'border-yellow-600'}`}>
                                            <div>
                                                <p className="text-xs font-bold text-yellow-500">{r.tarih} | {r.saat}</p>
                                                <h4 className="text-lg font-black uppercase">{r.ad}</h4>
                                                <p className="text-[10px] text-gray-400 uppercase">{r.hizmet} - {r.berber}</p>
                                            </div>
                                            <button onClick={()=>setRandevular(randevular.filter(x=>x.id!==r.id))} className="bg-red-600/20 text-red-500 p-3 rounded-full hover:bg-red-600 hover:text-white transition">
                                                <i className="fa-solid fa-trash"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {adminTab === 'ayarlar' && (
                                <div className="grid md:grid-cols-2 gap-8">
                                    {/* Hizmet Yönetimi */}
                                    <div className="glass p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-sm uppercase italic">Hizmet Listesi</h3>
                                            <button onClick={hizmetEkle} className="bg-green-600 text-white text-[10px] px-3 py-1 rounded-lg font-bold">+ EKLE</button>
                                        </div>
                                        <div className="space-y-2">
                                            {hizmetler.map(h => (
                                                <div key={h.id} className="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                                                    <span className="text-sm">{h.ad} - <b className="text-yellow-600">{h.fiyat}₺</b></span>
                                                    <button onClick={()=>setHizmetler(hizmetler.filter(x=>x.id!==h.id))} className="text-red-500 text-xs hover:scale-110 transition">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Berber Yönetimi */}
                                    <div className="glass p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-sm uppercase italic">Personel (Berberler)</h3>
                                            <button onClick={berberEkle} className="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-lg font-bold">+ EKLE</button>
                                        </div>
                                        <div className="space-y-2">
                                            {berberler.map(b => (
                                                <div key={b.id} className="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                                                    <span className="text-sm font-bold uppercase">{b.ad}</span>
                                                    <div className="flex gap-3 items-center">
                                                        <button onClick={() => {
                                                            const t = prompt("Hangi Tarih? (YYYY-AA-GG)");
                                                            const s = prompt("Hangi Saat? (Örn: 13:00)");
                                                            if(t && s) molaVer(t, s, b.ad);
                                                        }} className="text-[9px] bg-red-900/40 text-red-400 px-2 py-1 rounded">SAAT KAPAT</button>
                                                        <button onClick={()=>setBerberler(berberler.filter(x=>x.id!==b.id))} className="text-red-500 text-xs hover:scale-110 transition">✕</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
