<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Tekeli | Premium Barber System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?q=80&w=2074&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; font-family: 'Inter', sans-serif; color: #e5e7eb;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .gold-btn { background: linear-gradient(135deg, #d4af37 0%, #a67c00 100%); color: #000; font-weight: 800; }
        .input-field { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [view, setView] = useState(sessionStorage.getItem('is_admin') === 'true' ? 'admin' : 'customer');
            const [adminTab, setAdminTab] = useState('dashboard');
            const [sorguNo, setSorguNo] = useState("");
            const [sorguSonuc, setSorguSonuc] = useState(null);
            
            // --- DATA ---
            const [randevular, setRandevular] = useState([]);
            const [tamamlananlar, setTamamlananlar] = useState([]);
            const [hizmetler, setHizmetler] = useState([{id:1, ad:'Saç Kesimi', fiyat:300}, {id:2, ad:'Sakal Tasarımı', fiyat:150}]);
            const [berberler, setBerberler] = useState([{id:1, ad:'Ahmet Tekeli', mola: []}]);
            const [stok, setStok] = useState([{id:1, ad:'Jilet', miktar:50}, {id:2, ad:'Şampuan', miktar:10}]);

            const mesaiSaatleri = ["09:00", "10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00"];
            const chartRef = useRef(null);

            // Verileri yükle/kaydet
            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('barber_ultra_v1')) || {};
                if(saved.randevular) setRandevular(saved.randevular);
                if(saved.tamamlananlar) setTamamlananlar(saved.tamamlananlar);
                if(saved.hizmetler) setHizmetler(saved.hizmetler);
                if(saved.berberler) setBerberler(saved.berberler);
                if(saved.stok) setStok(saved.stok);
            }, []);

            useEffect(() => {
                localStorage.setItem('barber_ultra_v1', JSON.stringify({ randevular, tamamlananlar, hizmetler, berberler, stok }));
                if(adminTab === 'analiz') drawChart();
            }, [randevular, tamamlananlar, hizmetler, berberler, stok, adminTab]);

            // --- FUNCS ---
            const adminGiris = () => {
                if(view === 'admin') { sessionStorage.removeItem('is_admin'); setView('customer'); }
                else { if(prompt("Şifre:") === "1923") { sessionStorage.setItem('is_admin', 'true'); setView('admin'); } }
            };

            const drawChart = () => {
                const ctx = chartRef.current.getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'],
                        datasets: [{ label: 'Günlük Ciro', data: [1200, 1900, 3000, 500, 2000, 3500, 4000], backgroundColor: '#d4af37' }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            };

            const randevuTamamla = (r) => {
                const h = hizmetler.find(x => x.ad === r.hizmet);
                setTamamlananlar([...tamamlananlar, { ...r, fiyat: h ? h.fiyat : 0, tarih: new Date().toLocaleDateString() }]);
                setRandevular(randevular.filter(x => x.id !== r.id));
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <div className="flex justify-between items-center max-w-5xl mx-auto mb-10">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 gold-btn rounded-full flex items-center justify-center shadow-lg shadow-yellow-500/30">A</div>
                            <h1 className="text-2xl font-black italic text-yellow-500 tracking-tighter uppercase">Ahmet Tekeli</h1>
                        </div>
                        <button onClick={adminGiris} className="glass px-6 py-2 text-[10px] font-bold uppercase tracking-widest">{view === 'admin' ? 'Dükkan Görünümü' : 'Admin Girişi'}</button>
                    </div>

                    {view === 'customer' ? (
                        /* ================= MÜŞTERİ MODU ================= */
                        <div className="max-w-md mx-auto space-y-8 animate-in fade-in duration-500">
                            <div className="glass p-8 shadow-2xl relative">
                                <h2 className="text-xl font-bold mb-6 text-center italic">RANDEVU OLUŞTUR</h2>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    setRandevular([...randevular, { id: Date.now(), ad: fd.get('ad'), tel: fd.get('tel'), berber: fd.get('berber'), hizmet: fd.get('hizmet'), tarih: fd.get('tarih'), saat: fd.get('saat') }]);
                                    alert("Randevunuz Başarıyla Alındı!"); e.target.reset();
                                }} className="space-y-4">
                                    <input name="ad" placeholder="Ad Soyad" className="input-field" required />
                                    <input name="tel" placeholder="Telefon (05xx)" className="input-field" required />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select name="berber" className="input-field text-sm" required>
                                            <option value="">Berber Seç</option>
                                            {berberler.map(b => <option key={b.id}>{b.ad}</option>)}
                                        </select>
                                        <select name="hizmet" className="input-field text-sm" required>
                                            <option value="">Hizmet Seç</option>
                                            {hizmetler.map(h => <option key={h.id}>{h.ad} ({h.fiyat}₺)</option>)}
                                        </select>
                                    </div>
                                    <input name="tarih" type="date" className="input-field" required />
                                    <div className="grid grid-cols-4 gap-2">
                                        {mesaiSaatleri.map(s => (
                                            <label key={s} className="cursor-pointer group text-center">
                                                <input type="radio" name="saat" value={s} className="hidden peer" required />
                                                <div className="bg-white/5 border border-white/10 p-2 rounded-xl text-[10px] peer-checked:bg-yellow-600 peer-checked:text-black transition">
                                                    {s}
                                                </div>
                                            </label>
                                        ))}
                                    </div>
                                    <button className="gold-btn w-full p-4 rounded-2xl shadow-xl active:scale-95 transition mt-4 uppercase">Randevu Al</button>
                                </form>
                            </div>

                            <div className="glass p-6 border-blue-500/20">
                                <h3 className="text-xs font-bold mb-4 uppercase text-blue-400">Randevumu Sorgula</h3>
                                <div className="flex gap-2">
                                    <input value={sorguNo} onChange={(e)=>setSorguNo(e.target.value)} placeholder="Telefon numaran" className="input-field text-xs" />
                                    <button onClick={()=>setSorguSonuc(randevular.filter(r=>r.tel===sorguNo))} className="bg-blue-600 px-6 rounded-xl text-xs font-bold">Bul</button>
                                </div>
                                {sorguSonuc && (
                                    <div className="mt-4 space-y-2">
                                        {sorguSonuc.map(r => <div key={r.id} className="bg-white/5 p-3 rounded-xl border border-white/5 text-xs">{r.tarih} - {r.saat} | {r.hizmet}</div>)}
                                    </div>
                                )}
                            </div>
                        </div>
                    ) : (
                        /* ================= ADMİN MODU ================= */
                        <div className="max-w-6xl mx-auto space-y-6 animate-in slide-in-from-bottom duration-500">
                            <div className="flex gap-2 overflow-x-auto pb-4">
                                {['dashboard', 'analiz', 'hizmetler', 'personel', 'stok'].map(t => (
                                    <button key={t} onClick={()=>setAdminTab(t)} className={`px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest ${adminTab === t ? 'gold-btn' : 'glass'}`}>{t}</button>
                                ))}
                            </div>

                            {adminTab === 'dashboard' && (
                                <div className="grid md:grid-cols-2 gap-4">
                                    {randevular.map(r => (
                                        <div key={r.id} className="glass p-6 flex justify-between items-center border-l-4 border-yellow-500">
                                            <div>
                                                <p className="text-yellow-600 text-xs font-bold">{r.tarih} | {r.saat}</p>
                                                <h4 className="text-xl font-black">{r.ad}</h4>
                                                <p className="text-[10px] text-gray-500 uppercase tracking-widest">{r.hizmet} - {r.berber}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={()=>randevuTamamla(r)} className="bg-green-600/20 text-green-500 p-4 rounded-2xl"><i className="fa-solid fa-check"></i></button>
                                                <button onClick={()=>setRandevular(randevular.filter(x=>x.id!==r.id))} className="bg-red-600/20 text-red-500 p-4 rounded-2xl"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {adminTab === 'analiz' && (
                                <div className="glass p-8">
                                    <h3 className="mb-6 font-bold uppercase italic">Haftalık Kazanç Grafiği</h3>
                                    <canvas ref={chartRef}></canvas>
                                    <div className="mt-8 grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 p-6 rounded-3xl text-center">
                                            <p className="text-xs text-gray-500 uppercase">Toplam Ciro</p>
                                            <p className="text-3xl font-black text-green-500">{tamamlananlar.reduce((a,b)=>a+Number(b.fiyat),0)}₺</p>
                                        </div>
                                        <div className="bg-white/5 p-6 rounded-3xl text-center">
                                            <p className="text-xs text-gray-500 uppercase">Tamamlanan İşlem</p>
                                            <p className="text-3xl font-black text-blue-500">{tamamlananlar.length}</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {adminTab === 'stok' && (
                                <div className="glass p-8 max-w-xl mx-auto space-y-4">
                                    <button onClick={()=>{
                                        const ad = prompt("Malzeme:"); const mik = prompt("Miktar:");
                                        setStok([...stok, {id:Date.now(), ad, miktar:mik}]);
                                    }} className="gold-btn w-full p-4 rounded-xl mb-4 text-[10px]">YENİ STOK EKLE</button>
                                    {stok.map(s => (
                                        <div key={s.id} className="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                                            <span>{s.ad}</span>
                                            <div className="flex gap-4 items-center">
                                                <button onClick={()=>setStok(stok.map(x=>x.id===s.id?{...x, miktar:Number(x.miktar)-1}:x))} className="text-red-500">-</button>
                                                <span className="font-bold text-yellow-500">{s.miktar}</span>
                                                <button onClick={()=>setStok(stok.map(x=>x.id===s.id?{...x, miktar:Number(x.miktar)+1}:x))} className="text-green-500">+</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* Personel ve Hizmet sekmeleri benzer mantıkla verileri yönetir */}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
