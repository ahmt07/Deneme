<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli KASA - V21</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/81/81911.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/81/81911.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .p-btn { transition: all 0.2s; border: 2px solid transparent; background-color: #f8fafc; color: #64748b; }
        .active-p { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 900 !important; }
        .islem-row:nth-child(even) { background-color: #f9fafb; }
        #raporModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .rapor-icerik { background: white; width: 100%; max-width: 350px; border-radius: 2rem; padding: 20px; max-height: 85vh; overflow-y: auto; }
        @media print {
            body * { visibility: hidden; }
            #raporModal, #raporModal * { visibility: visible; }
            #raporModal { position: absolute; left: 0; top: 0; width: 100%; background: white; display: flex !important; }
            .rapor-icerik { box-shadow: none; border: none; width: 100%; max-width: none; padding: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 p-2 text-slate-900 text-[10px]">

    <div id="raporModal">
        <div class="rapor-icerik shadow-2xl border border-slate-200">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-base font-black uppercase tracking-tighter text-blue-800">DETAYLI RAPOR</h2>
                <div class="flex gap-1 no-print">
                    <button onclick="whatsappGonder()" class="text-emerald-600 font-black text-[9px] border border-emerald-200 px-2 py-1 rounded-lg bg-emerald-50">WA</button>
                    <button onclick="window.print()" class="text-blue-600 font-black text-[9px] border border-blue-200 px-2 py-1 rounded-lg bg-blue-50">YAZDIR</button>
                    <button onclick="document.getElementById('raporModal').style.display='none'" class="text-red-500 font-black text-[9px] border border-red-200 px-2 py-1 rounded-lg bg-red-50">KAPAT</button>
                </div>
            </div>
            <div id="raporData" class="space-y-3"></div>
            <div class="mt-4 pt-3 border-t text-[8px] text-slate-400 italic text-center">Ahmet Tekeli VIP Kasa Sistemi</div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-4 min-h-[95vh] flex flex-col border border-slate-100">
        
        <div class="text-center mb-2">
            <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase leading-none italic">AHMET TEKELİ KASA</h1>
            <p id="bugunTarih" class="text-[8px] font-bold text-blue-600 tracking-widest uppercase mt-1 italic"></p>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-2">
            <button onclick="pSec('ahmet')" id="btnahmet" class="p-btn active-p p-2 rounded-xl font-black uppercase flex flex-col items-center gap-1">
                <i class="fa-solid fa-scissors text-blue-600 text-sm"></i><span>AHMET</span>
            </button>
            <button onclick="pSec('Ercan')" id="btnErcan" class="p-btn p-2 rounded-xl font-black uppercase text-orange-600 flex flex-col items-center gap-1">
                <i class="fa-solid fa-scissors text-orange-500 text-sm"></i><span>ERCAN</span>
            </button>
            <button onclick="pSec('Efe')" id="btnEfe" class="p-btn p-2 rounded-xl font-black uppercase text-purple-600 flex flex-col items-center gap-1">
                <i class="fa-solid fa-scissors text-purple-500 text-sm"></i><span>EFE</span>
            </button>
            <button onclick="pSec('Turancan')" id="btnTurancan" class="p-btn p-2 rounded-xl font-bold uppercase">TURANCAN</button>
            <button onclick="pSec('Bekir')" id="btnBekir" class="p-btn p-2 rounded-xl font-bold uppercase">BEKİR</button>
            <button onclick="pSec('Gider')" id="btnGider" class="p-btn bg-red-50 text-red-600 p-2 rounded-xl font-bold uppercase italic text-[8px] flex flex-col items-center gap-0.5">
                <i class="fa-solid fa-wallet text-[10px]"></i><span>GİDER</span>
            </button>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-2">
            <button onclick="hizliDoldur('Saç', 500)" class="bg-white border py-2 rounded-lg font-bold shadow-sm active:bg-slate-50">SAÇ</button>
            <button onclick="hizliDoldur('Sakal', 250)" class="bg-white border py-2 rounded-lg font-bold shadow-sm active:bg-slate-50">SAKAL</button>
            <button onclick="hizliDoldur('Saç Sakal', 700)" class="bg-blue-50 border-blue-200 border py-2 rounded-lg font-black text-blue-700 active:bg-blue-100">SAÇ SAKAL</button>
            <button onclick="hizliDoldur('Çocuk', 450)" class="bg-emerald-50 border-emerald-100 border py-2 rounded-lg font-bold text-emerald-700">ÇOCUK</button>
            <button onclick="hizliDoldur('Haftalık Ödeme', 0)" class="bg-red-600 text-white py-2 rounded-lg font-black uppercase col-span-2 shadow-md active:bg-red-700">MAAŞ ÖDEMESİ</button>
        </div>

        <div class="bg-slate-100 p-3 rounded-2xl mb-2 shadow-inner border border-slate-200">
            <div class="flex gap-2 mb-2">
                <input type="text" id="h" placeholder="İşlem / Maaş" class="w-1/2 p-2.5 rounded-xl border-none font-bold outline-none text-[10px]">
                <input type="number" id="t" placeholder="₺" class="w-1/2 p-2.5 rounded-xl border-none font-black outline-none text-blue-600 text-base">
            </div>
            <div class="flex gap-2">
                <select id="y" class="w-full p-2.5 rounded-xl bg-white font-black outline-none border border-gray-200 text-[9px]">
                    <option value="Nakit">NAKİT</option>
                    <option value="Kart">KART</option>
                    <option value="Iban">IBAN</option>
                </select>
                <button onclick="kaydet()" id="kayitBtn" class="bg-slate-800 text-white px-6 rounded-xl font-bold uppercase active:scale-95 text-[9px]">KAYDET</button>
            </div>
        </div>

        <div class="flex-grow bg-slate-50 rounded-xl border border-slate-200 overflow-hidden mb-2 flex flex-col min-h-[80px]">
            <div class="overflow-y-auto max-h-24 flex-grow text-[8px]" id="islemListesi"></div>
        </div>

        <div class="grid grid-cols-3 gap-1 mb-2 text-center text-[7px] font-black uppercase italic">
            <div class="bg-blue-50 p-1.5 rounded-lg border border-blue-100">NAKİT: <span id="yNakit" class="text-blue-700">0</span></div>
            <div class="bg-orange-50 p-1.5 rounded-lg border border-orange-100">KART: <span id="yKart" class="text-orange-700">0</span></div>
            <div class="bg-purple-50 p-1.5 rounded-lg border border-purple-100">IBAN: <span id="yIban" class="text-purple-700">0</span></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-2">
            <div class="bg-orange-50 p-2 rounded-xl border border-orange-200">
                <p class="font-black text-orange-600 uppercase text-center text-[7px]">ERCAN (%50)</p>
                <div class="flex justify-between font-black text-[9px] mt-1 border-b border-orange-100 pb-1">
                    <span>İŞ: <span id="eToplamIs">0</span></span>
                    <span>PAY: <span id="pErcan">0</span></span>
                </div>
            </div>
            <div class="bg-purple-50 p-2 rounded-xl border border-purple-200">
                <p class="font-black text-purple-600 uppercase text-center text-[7px]">EFE (%30)</p>
                <div class="flex justify-between font-black text-[9px] mt-1 border-b border-purple-100 pb-1">
                    <span>İŞ: <span id="fToplamIs">0</span></span>
                    <span>PAY: <span id="pEfe">0</span></span>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-3 rounded-2xl shadow-xl mb-2">
            <div class="flex justify-between items-center mb-0.5">
                <p class="text-[8px] font-bold text-slate-400 uppercase italic">Günlük Net Kâr</p>
                <p id="netKalan" class="text-xl font-black text-emerald-400">0 ₺</p>
            </div>
            <div class="flex justify-between text-[7px] font-bold text-slate-400 border-t border-white/10 pt-1">
                <span>CİRO: <span id="cToplam" class="text-white">0₺</span></span>
                <span>GİDER: <span id="gToplam" class="text-red-400">0₺</span></span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="kasaSifirla()" class="py-2.5 bg-emerald-600 text-white text-[9px] font-black rounded-xl uppercase active:scale-95 shadow-md">GÜNÜ KAPAT</button>
            <button onclick="aySifirla()" class="py-2.5 bg-red-600 text-white text-[9px] font-black rounded-xl uppercase active:scale-95 shadow-md">AYI SIFIRLA</button>
        </div>

        <div onclick="raporUret()" class="mt-2 bg-blue-600 text-white py-1.5 rounded-xl text-center shadow-md cursor-pointer active:scale-95 transition-all border-2 border-blue-400">
            <h2 id="aylikCiro" class="text-sm font-black">0 ₺</h2>
            <p class="text-[6px] font-bold uppercase opacity-80 mt-0.5 tracking-tighter italic">AY SONU RAPORU İÇİN TIKLA</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDpT9QsG7V23KtKZMVXmIfeX_Mg-eAeBZM", databaseURL: "https://berberkasa-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "berberkasa" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let p = 'ahmet'; let hesaplanmisNet = 0; let sonKasaVerisi = null; let whatsappMetni = "";
        const simdi = new Date();
        const ayID = simdi.getFullYear() + "-" + (simdi.getMonth() + 1);
        document.getElementById('bugunTarih').innerText = simdi.toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

        function pSec(sec) { p = sec; document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-p')); document.getElementById('btn' + sec).classList.add('active-p'); }
        function hizliDoldur(islem, fiyat) { document.getElementById('h').value = islem; document.getElementById('t').value = fiyat; }
        function kaydet() {
            const h = document.getElementById('h').value; const t = parseFloat(document.getElementById('t').value); const y = document.getElementById('y').value;
            if(!h || isNaN(t)) return;
            db.ref('kasa/').push({ h, t, y, p, tarih: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}) });
            document.getElementById('h').value = ''; document.getElementById('t').value = '';
        }
        function kayitSil(id) { if(confirm("Bu işlemi siliyorsun abi?")) { db.ref('kasa/' + id).remove(); } }

        db.ref('kasa/').on('value', (snapshot) => {
            const veriler = snapshot.val(); sonKasaVerisi = veriler;
            const listDiv = document.getElementById('islemListesi'); listDiv.innerHTML = "";
            let tC=0, gT=0; let u = { Ercan:0, Efe:0 }; let yOzet = { Nakit:0, Kart:0, Iban:0 };
            if (veriler) {
                Object.keys(veriler).reverse().forEach(key => {
                    const v = veriler[key]; const t = parseFloat(v.t);
                    listDiv.innerHTML += `
                        <div class="islem-row flex justify-between items-center p-1.5 border-b">
                            <span><b>${v.p}:</b> ${v.h}</span>
                            <div class="flex items-center gap-2">
                                <span class="font-black">${t} ₺</span>
                                <button onclick="kayitSil('${key}')" class="text-red-400 px-1"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                            </div>
                        </div>`;
                    if (v.h.includes('Ödeme') || v.p === 'Gider') { gT += t; } 
                    else { tC += t; if(v.p==='Ercan') u.Ercan += t; if(v.p==='Efe') u.Efe += t; if(yOzet[v.y] !== undefined) yOzet[v.y] += t; }
                });
            }
            const ePay = Math.floor(u.Ercan * 0.5); const fPay = Math.floor(u.Efe * 0.3);
            hesaplanmisNet = Math.floor(tC - (ePay + fPay + gT));
            document.getElementById('yNakit').innerText = yOzet.Nakit; document.getElementById('yKart').innerText = yOzet.Kart; document.getElementById('yIban').innerText = yOzet.Iban;
            document.getElementById('eToplamIs').innerText = u.Ercan; document.getElementById('fToplamIs').innerText = u.Efe;
            document.getElementById('pErcan').innerText = ePay; document.getElementById('pEfe').innerText = fPay;
            document.getElementById('cToplam').innerText = tC + " ₺"; document.getElementById('gToplam').innerText = gT + " ₺";
            document.getElementById('netKalan').innerText = hesaplanmisNet + " ₺";
        });

        function raporUret() {
            if(!sonKasaVerisi) return;
            let r = { ahmet: {is:0}, Ercan: {is:0, maas:0}, Efe: {is:0, maas:0}, Turancan: {maas:0}, Bekir: {maas:0}, Gider: 0, Ciro:0 };
            let yO = { Nakit:0, Kart:0, Iban:0 };
            Object.values(sonKasaVerisi).forEach(v => {
                const t = parseFloat(v.t);
                if(v.h.includes('Ödeme')) { if(r[v.p]) r[v.p].maas += t; }
                else if(v.p === 'Gider') { r.Gider += t; }
                else { r.Ciro += t; if(r[v.p]) r[v.p].is += t; if(yO[v.y] !== undefined) yO[v.y] += t; }
            });
            const ePay = Math.floor(r.Ercan.is * 0.5); const fPay = Math.floor(r.Efe.is * 0.3);
            const tGider = Math.floor(ePay + fPay + r.Ercan.maas + r.Efe.maas + r.Turancan.maas + r.Bekir.maas + r.Gider);
            const nK = Math.floor(r.Ciro - tGider);
            whatsappMetni = `*AHMET TEKELİ KASA RAPORU*%0A Tarih: ${document.getElementById('bugunTarih').innerText}%0A--------------------%0A*CİRO:* ${r.Ciro} ₺%0A- Nakit: ${yO.Nakit} ₺%0A- Kart: ${yO.Kart} ₺%0A- Iban: ${yO.Iban} ₺%0A--------------------%0A*USTA PAYLARI:*%0A- Ercan: ${ePay} ₺%0A- Efe: ${fPay} ₺%0A--------------------%0A*NET KAZANÇ:* ${nK} ₺`;
            document.getElementById('raporData').innerHTML = `
                <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100">
                    <p class="font-black text-blue-700 text-center border-b mb-2 pb-1 text-[9px]">TAHSİLAT DETAYI</p>
                    <div class="flex justify-around text-[9px] font-bold"><span>NAKİT: ${yO.Nakit}</span><span>KART: ${yO.Kart}</span><span>IBAN: ${yO.Iban}</span></div>
                </div>
                <div class="bg-slate-50 p-3 rounded-2xl border"><div class="space-y-1.5 text-[9px]"><div class="flex justify-between"><span><b>AHMET:</b></span> <span>${r.ahmet.is} ₺</span></div><div class="flex justify-between border-t pt-1"><span><b>ERCAN (%50):</b></span> <span>Pay: ${ePay} ₺</span></div><div class="flex justify-between border-t pt-1"><span><b>EFE (%30):</b></span> <span>Pay: ${fPay} ₺</span></div></div></div>
                <div class="bg-slate-900 text-white p-4 rounded-2xl text-center shadow-lg"><p class="text-[7px] text-slate-400 uppercase tracking-widest italic">NET KAZANÇ</p><p class="text-2xl font-black text-emerald-400">${nK} ₺</p></div>`;
            document.getElementById('raporModal').style.display = 'flex';
        }

        function whatsappGonder() { window.open(`https://api.whatsapp.com/send?text=${whatsappMetni}`, '_blank'); }
        db.ref('aylikNet/' + ayID).on('value', (snapshot) => { document.getElementById('aylikCiro').innerText = Math.floor(snapshot.val() || 0).toLocaleString('tr-TR') + " ₺"; });
        function kasaSifirla() { if(confirm("Günü kapatıyorsun abi?")) { db.ref('aylikNet/' + ayID).transaction(curr => (curr || 0) + hesaplanmisNet); db.ref('kasa/').remove(); } }
        function aySifirla() { if(confirm("Ayı sıfırla?")) db.ref('aylikNet/' + ayID).set(0); }
    </script>
</body>
</html>
