<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli KASA - V47 Arşiv Fix</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .p-btn { transition: all 0.2s; border: 2px solid transparent; background-color: #f8fafc; color: #64748b; }
        .active-p { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 900 !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 15px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-icerik { background: white; width: 100%; max-width: 450px; border-radius: 2.5rem; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .detay-gizle { display: none; }
    </style>
</head>
<body class="bg-slate-50 p-2 text-slate-900 text-[10px]">

    <div id="personelTakipModal" class="modal-overlay">
        <div class="modal-icerik shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 id="pTakipIsim" class="font-black uppercase text-blue-800 italic text-sm">PERSONEL PANELİ</h2>
                <button onclick="document.getElementById('personelTakipModal').style.display='none'" class="text-red-500 font-black px-2">KAPAT</button>
            </div>
            <div id="pTakipOzet" class="mb-4"></div>
            <div id="pTakipListe" class="space-y-1"></div>
        </div>
    </div>

    <div id="raporModal" class="modal-overlay">
        <div class="modal-icerik shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-black text-blue-800 italic uppercase text-xs">ARŞİV VE RAPORLAR</h2>
                <button onclick="document.getElementById('raporModal').style.display='none'" class="text-red-500 font-black px-2 text-xl">×</button>
            </div>
            <div class="mb-4 bg-slate-50 p-3 rounded-2xl">
                <input type="date" id="arsivTarih" onchange="arsivGetir(this.value)" class="w-full p-2 rounded-xl border-2 border-slate-200 font-black text-sm outline-none">
            </div>
            <div id="raporData" class="space-y-3"></div>
        </div>
    </div>

    <div id="veresiyeModal" class="modal-overlay"><div class="modal-icerik"><div class="flex justify-between border-b pb-2 mb-4"><h2 class="font-black text-blue-800 italic uppercase">VERESİYE</h2><button onclick="document.getElementById('veresiyeModal').style.display='none'" class="text-red-500 font-black">Kapat</button></div><div class="bg-blue-50 p-3 rounded-xl mb-3"><input type="text" id="vMusteri" placeholder="Müşteri" class="w-full p-2 mb-2 rounded-lg font-bold"><div class="flex gap-1"><input type="number" id="vTutar" placeholder="₺" class="w-1/2 p-2 rounded-lg font-black"><button onclick="veresiyeEkle()" class="w-1/2 bg-blue-600 text-white rounded-lg font-black uppercase text-[9px]">Yaz</button></div></div><div id="veresiyeListesi"></div></div></div>
    <div id="giderModal" class="modal-overlay"><div class="modal-icerik"><div class="flex justify-between border-b pb-2 mb-4"><h2 class="font-black text-red-800 italic uppercase">GİDER/MAAŞ</h2><button onclick="document.getElementById('giderModal').style.display='none'" class="text-red-500 font-black">Kapat</button></div><div class="bg-red-50 p-3 rounded-xl mb-3"><input type="text" id="gAd" placeholder="Gider Adı" class="w-full p-2 mb-2 rounded-lg"><div class="flex gap-1"><input type="number" id="gTutar" placeholder="₺" class="w-1/2 p-2 rounded-lg"><button onclick="giderPanelEkle()" class="w-1/2 bg-red-600 text-white rounded-lg font-bold uppercase text-[9px]">Ekle</button></div></div><div id="giderPanelListesi"></div></div></div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-4 min-h-[95vh] flex flex-col border border-slate-100">
        <div class="flex justify-between items-center mb-4 px-1">
            <button onclick="document.getElementById('veresiyeModal').style.display='flex'" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-full font-black text-[8px] uppercase italic">VERESİYE</button>
            <div class="text-center"><h1 class="text-lg font-black text-slate-900 tracking-tighter uppercase italic">AHMET TEKELİ KASA</h1><p id="bugunTarih" class="text-[7px] font-bold text-blue-600 tracking-widest uppercase mt-1 italic"></p></div>
            <button onclick="document.getElementById('giderModal').style.display='flex'" class="bg-red-100 text-red-700 px-3 py-1.5 rounded-full font-black text-[8px] uppercase italic">GİDERLER</button>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-3">
            <button onclick="pSec('ahmet')" ondblclick="pPanelAc('ahmet')" id="btnahmet" class="p-btn active-p p-3 rounded-2xl font-black uppercase flex flex-col items-center gap-1"><i class="fa-solid fa-user-tie text-blue-600"></i><span>AHMET</span></button>
            <button onclick="pSec('Ercan')" ondblclick="pPanelAc('Ercan')" id="btnErcan" class="p-btn p-3 rounded-2xl font-black uppercase text-orange-600 flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-orange-500"></i><span>ERCAN</span></button>
            <button onclick="pSec('Efe')" ondblclick="pPanelAc('Efe')" id="btnEfe" class="p-btn p-3 rounded-2xl font-black uppercase text-purple-600 flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-purple-500"></i><span>EFE</span></button>
            <button onclick="pSec('Turancan')" ondblclick="pPanelAc('Turancan')" id="btnTurancan" class="p-btn p-3 rounded-xl font-black uppercase text-[9px]">TURANCAN</button>
            <button onclick="pSec('Bekir')" ondblclick="pPanelAc('Bekir')" id="btnBekir" class="p-btn p-3 rounded-xl font-black uppercase col-span-2 text-center text-[9px]">BEKİR</button>
        </div>

        <div class="grid grid-cols-4 gap-1.5 mb-3">
            <button onclick="hizliDoldur('Saç', 500)" class="bg-white border py-3 rounded-xl font-bold">SAÇ</button>
            <button onclick="hizliDoldur('Sakal', 250)" class="bg-white border py-3 rounded-xl font-bold">SAKAL</button>
            <button onclick="hizliDoldur('Çocuk Saç', 450)" class="bg-white border py-3 rounded-xl font-bold">ÇOCUK</button>
            <button onclick="hizliDoldur('Saç Sakal', 700)" class="bg-blue-50 border-blue-200 border py-3 rounded-xl font-black text-blue-700">S+S</button>
        </div>

        <div class="bg-slate-100 p-4 rounded-3xl mb-4 border border-slate-200">
            <div class="flex gap-2 mb-2"><input type="text" id="h" placeholder="İşlem" class="w-1/2 p-3 rounded-xl border-none font-bold text-[11px]"><input type="number" id="t" placeholder="₺" class="w-1/2 p-3 rounded-xl border-none font-black text-blue-600 text-lg"></div>
            <div class="flex gap-2"><select id="y" class="w-full p-3 rounded-xl bg-white font-black text-[11px]"><option value="Nakit">NAKİT</option><option value="Kart">KART</option><option value="Iban">IBAN</option></select><button onclick="kaydet()" class="bg-slate-800 text-white px-8 rounded-xl font-black uppercase text-[11px]">KAYDET</button></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-4">
            <div class="bg-orange-50 p-4 rounded-3xl border-2 border-orange-200 text-center shadow-sm" onclick="pPanelAc('Ercan')">
                <p class="font-black text-orange-800 uppercase border-b border-orange-200 mb-2 text-xs italic">ERCAN (%50)</p>
                <div class="font-black text-slate-800 text-xs">İŞ: <span id="eToplamIs">0</span> | PAY: <span id="pErcan">0</span></div>
            </div>
            <div class="bg-purple-50 p-4 rounded-3xl border-2 border-purple-200 text-center shadow-sm" onclick="pPanelAc('Efe')">
                <p class="font-black text-purple-800 uppercase border-b border-purple-200 mb-2 text-xs italic">EFE (%30)</p>
                <div class="font-black text-slate-800 text-xs">İŞ: <span id="fToplamIs">0</span> | PAY: <span id="fPay">0</span></div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-4 rounded-3xl shadow-xl mb-4 mt-auto">
            <div class="flex justify-between items-center mb-1"><p class="text-[10px] font-black text-slate-400 uppercase italic">GÜNLÜK NET KÂR</p><p id="netKalan" class="text-3xl font-black text-emerald-400">0 ₺</p></div>
            <div class="flex justify-between text-[11px] font-black border-t border-white/20 pt-2 uppercase"><span class="text-slate-200">CİRO: <span id="cToplam" class="text-white">0₺</span></span><span class="text-red-400">GİDER: <span id="gToplam" class="text-red-400">0₺</span></span></div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="kasaSifirla()" class="py-4 bg-emerald-600 text-white text-[11px] font-black rounded-2xl uppercase italic">GÜNÜ KAPAT</button>
            <button onclick="aySifirla()" class="py-4 bg-red-600 text-white text-[11px] font-black rounded-2xl uppercase italic">AYI SIFIRLA</button>
        </div>

        <div onclick="raporUret()" class="mt-3 bg-blue-600 text-white py-2.5 rounded-2xl text-center shadow-md cursor-pointer border-2 border-blue-400">
            <h2 id="aylikCiro" class="text-lg font-black italic">0 ₺</h2>
            <p class="text-[8px] font-bold uppercase opacity-80 mt-0.5 italic">ARŞİV VE RAPORLAR</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDpT9QsG7V23KtKZMVXmIfeX_Mg-eAeBZM", databaseURL: "https://berberkasa-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "berberkasa" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        let p = 'ahmet'; let sonKasaVerisi = null; let hesaplanmisNet = 0;
        const simdi = new Date(); const ayID = simdi.getFullYear() + "-" + (simdi.getMonth() + 1);
        const gunID_ISO = simdi.toISOString().split('T')[0];
        document.getElementById('bugunTarih').innerText = simdi.toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

        function pSec(sec) { p = sec; document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-p')); document.getElementById('btn' + sec).classList.add('active-p'); }
        function hizliDoldur(is, f) { document.getElementById('h').value = is; document.getElementById('t').value = f; }
        
        function kaydet() {
            const h = document.getElementById('h').value; const t = parseFloat(document.getElementById('t').value); const y = document.getElementById('y').value;
            if(!h || isNaN(t)) return;
            const isMaas = h.toLowerCase().includes('maa') || h.toLowerCase().includes('avan');
            db.ref('kasa/').push({ h, t, y, p, saat: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}), maasMi: isMaas });
            document.getElementById('h').value = ''; document.getElementById('t').value = '';
        }

        // --- ARŞİV SİSTEMİ (PANEL - FIX) ---
        async function arsivGetir(secilenTarih) {
            const alan = document.getElementById('raporData');
            alan.innerHTML = "<p class='text-center py-5 font-bold animate-pulse uppercase'>Yükleniyor...</p>";
            
            // Tarih formatını Firebase'e uygun hale getir (GG-AA-YYYY)
            const pts = secilenTarih.split("-");
            const formatliTarih = `${pts[2]}-${pts[1]}-${pts[0]}`;

            let snap = await db.ref('arsiv/' + formatliTarih).once('value');
            let v = snap.val();

            if(!v) {
                // Alternatif formatı dene (ISO)
                snap = await db.ref('arsiv/' + secilenTarih).once('value');
                v = snap.val();
            }

            if(!v) {
                alan.innerHTML = "<p class='text-center py-10 text-red-500 font-black uppercase'>Kayıt Bulunamadı.</p>";
                return;
            }

            let html = `<div class="bg-slate-900 text-white p-4 rounded-3xl text-center mb-4"><h3 class="font-black italic uppercase text-[10px] mb-1">${formatliTarih} RAPORU</h3></div>`;
            let gruplar = {};

            Object.values(v).forEach(x => {
                if(!gruplar[x.p]) gruplar[x.p] = { t: 0, l: "" };
                const tutar = parseFloat(x.t);
                gruplar[x.p].t += tutar;
                gruplar[x.p].l += `<div class="flex justify-between border-b py-2 text-[8px] font-bold opacity-70 italic"><span>${x.saat || '--'} | ${x.h}</span><span>${tutar} ₺</span></div>`;
            });

            Object.keys(gruplar).forEach(per => {
                const id = "arsiv-" + per.replace(/\s/g, '');
                html += `<div class="border rounded-2xl overflow-hidden shadow-sm bg-white mb-2">
                    <div onclick="document.getElementById('${id}').classList.toggle('detay-gizle')" class="bg-slate-50 p-3 flex justify-between items-center font-black uppercase italic cursor-pointer">
                        <span class="text-[10px]"><i class="fa-solid fa-chevron-down mr-2 opacity-30"></i>${per}</span>
                        <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[9px]">${gruplar[per].t} ₺</span>
                    </div>
                    <div id="${id}" class="p-3 detay-gizle bg-white border-t">${gruplar[per].l}</div>
                </div>`;
            });
            alan.innerHTML = html;
        }

        function raporUret() { document.getElementById('arsivTarih').value = gunID_ISO; document.getElementById('raporModal').style.display = 'flex'; arsivGetir(gunID_ISO); }

        // --- CANLI TAKİP ---
        function pPanelAc(isim) {
            if(!sonKasaVerisi) return;
            let pData = { n:0, k:0, i:0, odeme:0, liste: "" };
            Object.keys(sonKasaVerisi).forEach(k => {
                const v = sonKasaVerisi[k];
                if(v.p === isim) {
                    const t = parseFloat(v.t);
                    if(v.y === 'Nakit') pData.n += t; if(v.y === 'Kart') pData.k += t; if(v.y === 'Iban') pData.i += t;
                    pData.liste += `<div class="flex justify-between items-center border-b py-3 font-bold"><span>${v.saat} | ${v.h}</span><div class="flex items-center gap-3"><span>${t} ₺</span><button onclick="kayitSil('${k}')" class="text-red-400"><i class="fa-solid fa-trash-can"></i></button></div></div>`;
                }
            });
            document.getElementById('pTakipIsim').innerText = isim + " PANELİ";
            document.getElementById('pTakipOzet').innerHTML = `<div class="grid grid-cols-3 gap-2 text-center font-black"><div class="bg-blue-50 p-1 rounded text-blue-700">N:${pData.n}</div><div class="bg-orange-50 p-1 rounded text-orange-700">K:${pData.k}</div><div class="bg-purple-50 p-1 rounded text-purple-700">I:${pData.i}</div></div>`;
            document.getElementById('pTakipListe').innerHTML = pData.liste || "<p class='text-center py-5 opacity-50'>Kayıt yok.</p>";
            document.getElementById('personelTakipModal').style.display = 'flex';
        }

        // --- SİSTEM ---
        function kayitSil(id) { if(confirm("Sileyim mi abi?")) { db.ref('kasa/' + id).remove(); document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); } }
        function veresiyeEkle() { const m = document.getElementById('vMusteri').value; const t = parseFloat(document.getElementById('vTutar').value); if(!m || isNaN(t)) return; db.ref('veresiye/').push({ m, t, tarih: new Date().toLocaleDateString('tr-TR') }); document.getElementById('vMusteri').value = ''; document.getElementById('vTutar').value = ''; }
        db.ref('veresiye/').on('value', (snap) => { const liste = document.getElementById('veresiyeListesi'); liste.innerHTML = ""; const v = snap.val(); if(v) Object.keys(v).forEach(k => { liste.innerHTML += `<div class="flex justify-between items-center p-3 bg-white border rounded-xl mb-1 shadow-sm"><span class="font-black uppercase">${v[k].m}</span><div class="flex items-center gap-2"><span class="font-black text-blue-600">${v[k].t} ₺</span><button onclick="veresiyeAl('${k}', '${v[k].m}', ${v[k].t})" class="bg-emerald-500 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase">ALINDI</button></div></div>`; }); });
        function veresiyeAl(id, m, t) { if(confirm(m + " borcu alındı mı?")) { db.ref('kasa/').push({ h: m + " (Veresiye)", t, y: 'Nakit', p: 'ahmet', saat: 'Tahsilat' }); db.ref('veresiye/' + id).remove(); } }
        function giderPanelEkle() { const a = document.getElementById('gAd').value; const t = parseFloat(document.getElementById('gTutar').value); if(!a || isNaN(t)) return; db.ref('kasa/').push({ h: a, t, y: 'Nakit', p: 'Gider', saat: 'Masraf' }); document.getElementById('gAd').value = ''; document.getElementById('gTutar').value = ''; }

        db.ref('kasa/').on('value', (snap) => {
            const veriler = snap.val(); sonKasaVerisi = veriler;
            let tC=0, gT=0, yOz = { Nakit:0, Kart:0, Iban:0 }; let pOz = { Ercan: 0, Efe: 0 };
            const gL = document.getElementById('giderPanelListesi'); gL.innerHTML = "";
            if (veriler) {
                Object.keys(veriler).forEach(k => {
                    const v = veriler[k]; const t = parseFloat(v.t);
                    if (v.p === 'Gider' || v.maasMi) { gT += t; if(v.p==='Gider') gL.innerHTML += `<div class="flex justify-between bg-white p-2 rounded-lg border mb-1"><b>${v.h}</b><span>${t} ₺ <button onclick="kayitSil('${k}')" class="text-red-500 font-bold">X</button></span></div>`; } 
                    else { tC += t; yOz[v.y] += t; if(v.p === 'Ercan') pOz.Ercan += t; if(v.p === 'Efe') pOz.Efe += t; }
                });
            }
            const eP = Math.floor(pOz.Ercan * 0.5); const fP = Math.floor(pOz.Efe * 0.3);
            hesaplanmisNet = Math.floor(tC - (eP + fP + gT));
            document.getElementById('yNakit').innerText = yOz.Nakit; document.getElementById('yKart').innerText = yOz.Kart; document.getElementById('yIban').innerText = yOz.Iban;
            document.getElementById('eToplamIs').innerText = pOz.Ercan; document.getElementById('pErcan').innerText = eP;
            document.getElementById('fToplamIs').innerText = pOz.Efe; document.getElementById('fPay').innerText = fP;
            document.getElementById('cToplam').innerText = tC + " ₺"; document.getElementById('gToplam').innerText = gT + " ₺";
            document.getElementById('netKalan').innerText = hesaplanmisNet + " ₺";
        });

        db.ref('aylikNet/' + ayID).on('value', (s) => { document.getElementById('aylikCiro').innerText = (s.val() || 0).toLocaleString('tr-TR') + " ₺"; });
        function kasaSifirla() { if(confirm("Günü kapatıp arşive gönderiyorum?")) { const tr = simdi.toLocaleDateString('tr-TR').replace(/\./g, '-'); db.ref('arsiv/' + tr).set(sonKasaVerisi); db.ref('aylikNet/' + ayID).transaction(c => (c || 0) + hesaplanmisNet); db.ref('kasa/').remove(); } }
        function aySifirla() { if(confirm("Ayı sıfırlıyorum?")) { db.ref('aylikNet/' + ayID).set(0); } }
    </script>
</body>
</html>
