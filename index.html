<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Barber Yönetim</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-black text-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function BerberApp() {
            const [isAdmin, setIsAdmin] = useState(false);
            const [randevular, setRandevular] = useState([]);
            const [islemler, setIslemler] = useState([]);
            const ADMIN_SIFRE = "1923"; // Şifren

            // Verileri yükle
            useEffect(() => {
                setRandevular(JSON.parse(localStorage.getItem('b_randevular')) || []);
                setIslemler(JSON.parse(localStorage.getItem('b_islemler')) || []);
            }, []);

            // Verileri kaydet
            useEffect(() => {
                localStorage.setItem('b_randevular', JSON.stringify(randevular));
                localStorage.setItem('b_islemler', JSON.stringify(islemler));
            }, [randevular, islemler]);

            const randevuAl = (e) => {
                e.preventDefault();
                const ad = e.target.ad.value;
                const saat = e.target.saat.value;
                setRandevular([...randevular, { id: Date.now(), ad, saat }].sort((a,b) => a.saat.localeCompare(b.saat)));
                e.target.reset();
                alert("Randevunuz iletildi!");
            };

            const gelirTop = islemler.filter(i => i.tip === 'gelir').reduce((a, b) => a + Number(b.miktar), 0);
            const giderTop = islemler.filter(i => i.tip === 'gider').reduce((a, b) => a + Number(b.miktar), 0);

            return (
                <div className="p-4 max-w-4xl mx-auto">
                    {/* LOGO */}
                    <div className="text-center mb-10 pt-6">
                        <div onClick={() => {
                            const pw = prompt("Şifre:");
                            if(pw === ADMIN_SIFRE) setIsAdmin(true);
                        }} className="w-20 h-20 bg-yellow-600 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-bold text-black shadow-lg shadow-yellow-600/30 cursor-pointer active:scale-90 transition">A</div>
                        <h1 className="text-2xl font-black text-yellow-500 uppercase italic tracking-tighter">Premium Barber</h1>
                    </div>

                    {!isAdmin ? (
                        /* MÜŞTERİ PANELİ */
                        <div className="bg-gray-900 p-8 rounded-3xl border border-gray-800 shadow-2xl max-w-md mx-auto">
                            <h2 className="text-xl font-bold mb-6 text-center text-blue-400">Online Randevu</h2>
                            <form onSubmit={randevuAl} className="space-y-4">
                                <input name="ad" className="w-full bg-black border border-gray-700 p-4 rounded-2xl outline-none focus:border-blue-400" placeholder="Adınız Soyadınız" required />
                                <input name="saat" type="time" className="w-full bg-black border border-gray-700 p-4 rounded-2xl outline-none focus:border-blue-400" required />
                                <button className="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase active:scale-95 transition">Onayla</button>
                            </form>
                        </div>
                    ) : (
                        /* YÖNETİCİ PANELİ */
                        <div className="space-y-6">
                            <div className="flex justify-between items-center bg-yellow-600/10 p-4 rounded-2xl border border-yellow-600/30">
                                <span className="text-yellow-500 font-bold text-xs uppercase">Yönetici Modu</span>
                                <button onClick={() => setIsAdmin(false)} className="bg-red-600 px-4 py-1 rounded-xl text-[10px] font-bold">ÇIKIŞ</button>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-gray-900 p-4 rounded-2xl border border-gray-800 text-center">
                                    <p className="text-[10px] text-gray-500 uppercase italic">Net Kasa</p>
                                    <p className="text-xl font-bold text-green-500">{gelirTop - giderTop}₺</p>
                                </div>
                                <div className="bg-gray-900 p-4 rounded-2xl border border-gray-800 text-center">
                                    <p className="text-[10px] text-gray-500 uppercase italic">Bekleyen</p>
                                    <p className="text-xl font-bold text-blue-400">{randevular.length}</p>
                                </div>
                            </div>

                            <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-xl">
                                <h3 className="text-xs font-bold mb-4 text-blue-400 uppercase tracking-widest">Randevu Defteri</h3>
                                <div className="space-y-2">
                                    {randevular.map(r => (
                                        <div key={r.id} className="flex justify-between items-center bg-black p-4 rounded-xl border border-gray-800">
                                            <div>
                                                <p className="text-blue-400 font-bold text-xs">{r.saat}</p>
                                                <p className="font-bold uppercase text-sm">{r.ad}</p>
                                            </div>
                                            <button onClick={() => {
                                                const m = prompt("Tutar:", "300");
                                                if(m) {
                                                    setIslemler([{id:Date.now(), baslik: r.ad, miktar:m, tip:'gelir'}, ...islemler]);
                                                    setRandevular(randevular.filter(x => x.id !== r.id));
                                                }
                                            }} className="bg-green-600 text-black px-3 py-1 rounded-lg text-[10px] font-bold">TAMAMLA</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BerberApp />);
    </script>
</body>
</html>
