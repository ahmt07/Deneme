<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahmet Tekeli KASA - V26</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/ahmt07/Deneme/main/ikon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .p-btn { transition: all 0.2s; border: 2px solid transparent; background-color: #f8fafc; color: #64748b; }
        .active-p { border-color: #2563eb !important; background-color: #eff6ff !important; color: #1e40af !important; font-weight: 900 !important; }
        .islem-row:nth-child(even) { background-color: #f9fafb; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-icerik { background: white; width: 100%; max-width: 400px; border-radius: 2rem; padding: 20px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 p-2 text-slate-900 text-[10px]">

    <div id="veresiyeModal" class="modal-overlay">
        <div class="modal-icerik shadow-2xl border border-slate-200 text-[9px]">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-black uppercase text-blue-800 italic">VERESİYE DEFTERİ</h2>
                <button onclick="document.getElementById('veresiyeModal').style.display='none'" class="text-red-500 font-black uppercase">Kapat</button>
            </div>
            <div class="bg-slate-100 p-2 rounded-xl mb-3">
                <input type="text" id="vMusteri" placeholder="Müşteri Adı" class="w-full p-2 mb-2 rounded-lg border-none font-bold">
                <div class="flex gap-1">
                    <input type="number" id="vTutar" placeholder="₺ Borç" class="w-1/2 p-2 rounded-lg border-none font-black text-blue-600">
                    <button onclick="veresiyeEkle()" class="w-1/2 bg-blue-600 text-white rounded-lg font-bold uppercase">EKLE</button>
                </div>
            </div>
            <input type="text" id="vAra" onkeyup="veresiyeListele()" placeholder="Müşteri Ara..." class="w-full p-2 mb-2 border rounded-lg font-bold">
            <div id="veresiyeListesi" class="space-y-2 overflow-y-auto max-h-60"></div>
        </div>
    </div>

    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] shadow-2xl p-4 min-h-[95vh] flex flex-col border border-slate-100">
        <div class="flex justify-between items-center mb-2 px-1">
            <button onclick="document.getElementById('veresiyeModal').style.display='flex'" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-black text-[7px] uppercase border border-blue-200 italic">VERESİYE</button>
            <div class="text-center">
                <h1 class="text-lg font-black text-slate-900 tracking-tighter uppercase leading-none italic">AHMET TEKELİ KASA</h1>
                <p id="bugunTarih" class="text-[7px] font-bold text-blue-600 tracking-widest uppercase mt-1 italic"></p>
            </div>
            <div class="w-10"></div>
        </div>

        <div class="grid grid-cols-3 gap-1.5 mb-2">
            <button onclick="pSec('ahmet')" id="btnahmet" class="p-btn active-p p-2 rounded-xl font-black uppercase flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-blue-600"></i><span>AHMET</span></button>
            <button onclick="pSec('Ercan')" id="btnErcan" class="p-btn p-2 rounded-xl font-black uppercase text-orange-600 flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-orange-500"></i><span>ERCAN</span></button>
            <button onclick="pSec('Efe')" id="btnEfe" class="p-btn p-2 rounded-xl font-black uppercase text-purple-600 flex flex-col items-center gap-1"><i class="fa-solid fa-scissors text-purple-500"></i><span>EFE</span></button>
            <button onclick="pSec('Turancan')" id="btnTurancan" class="p-btn p-2 rounded-xl font-bold uppercase">TURANCAN</button>
            <button onclick="pSec('Bekir')" id="btnBekir" class="p-btn p-2 rounded-xl font-bold uppercase">BEKİR</button>
            <button onclick="pSec('Gider')" id="btnGider" class="p-btn bg-red-50 text-red-600 p-2 rounded-xl font-bold uppercase flex flex-col items-center"><i class="fa-solid fa-wallet text-[10px]"></i><span>GİDER</span></button>
        </div>

        <div class="grid grid-cols-4 gap-1 mb-2">
            <button onclick="hizliDoldur('Saç', 500)" class="bg-white border py-2 rounded-lg font-bold">SAÇ</button>
            <button onclick="hizliDoldur('Sakal', 250)" class="bg-white border py-2 rounded-lg font-bold">SAKAL</button>
            <button onclick="hizliDoldur('Fön', 100)" class="bg-white border py-2 rounded-lg font-bold">FÖN</button>
            <button onclick="hizliDoldur('Saç Sakal', 700)" class="bg-blue-50 border-blue-200 border py-2 rounded-lg font-black text-blue-700 italic">700₺</button>
        </div>

        <div class="bg-slate-100 p-3 rounded-2xl mb-2 shadow-inner border border-slate-200">
            <div class="flex gap-2 mb-2">
                <input type="text" id="h" placeholder="İşlem / Maaş" class="w-1/2 p-2.5 rounded-xl border-none font-bold outline-none text-[10px]">
                <input type="number" id="t" placeholder="₺" class="w-1/2 p-2.5 rounded-xl border-none font-black outline-none text-blue-600 text-base">
            </div>
            <div class="flex gap-2">
                <select id="y" class="w-full p-2.5 rounded-xl bg-white font-black outline-none border border-gray-200 text-[9px]">
                    <option value="Nakit">NAKİT</option><option value="Kart">KART</option><option value="Iban">IBAN</option>
                </select>
                <button onclick="kaydet()" class="bg-slate-800 text-white px-6 rounded-xl font-bold uppercase active:scale-95 text-[9px]">KAYDET</button>
            </div>
        </div>

        <div class="flex-grow bg-slate-50 rounded-xl border border-slate-200 overflow-hidden mb-2 flex flex-col min-h-[120px]">
            <div class="overflow-y-auto max-h-40 flex-grow text-[8px]" id="islemListesi"></div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-2 text-[7px]">
            <div class="bg-orange-50 p-2 rounded-xl border border-orange-200">
                <p class="font-black text-orange-600 uppercase text-center border-b mb-1">ERCAN (%50)</p>
                <div class="flex justify-between font-bold"><span>NK: <span id="eNakit">0</span></span><span>KR: <span id="eKart">0</span></span><span>IB: <span id="eIban">0</span></span></div>
                <div class="flex justify-between border-t border-orange-200 pt-1 font-black"><span>TOPLAM: <span id="eToplam">0</span></span><span>PAY: <span id="pErcan">0</span></span></div>
            </div>
            <div class="bg-purple-50 p-2 rounded-xl border border-purple-200">
                <p class="font-black text-purple-600 uppercase text-center border-b mb-1">EFE (%30)</p>
                <div class="flex justify-between font-bold"><span>NK: <span id="fNakit">0</span></span><span>KR: <span id="fKart">0</span></span><span>IB: <span id="fIban">0</span></span></div>
                <div class="flex justify-between border-t border-purple-200 pt-1 font-black"><span>TOPLAM: <span id="fToplam">0</span></span><span>PAY: <span id="pEfe">0</span></span></div>
            </div>
        </div>

        <div class="bg-slate-900 text-white p-3 rounded-2xl shadow-xl mb-2">
            <div class="flex justify-between items-center mb-0.5 italic">
                <p class="text-[8px] font-bold text-slate-400 uppercase">Dükkan Net Kâr</p>
                <p id="netKalan" class="text-xl font-black text-emerald-400">0 ₺</p>
            </div>
            <div class="flex justify-between text-[7px] font-bold text-slate-400 border-t border-white/10 pt-1">
                <span>CİRO: <span id="cToplam">0₺</span></span><span>GİDER: <span id="gToplam">0₺</span></span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <button onclick="kasaSifirla()" class="py-2.5 bg-emerald-600 text-white text-[9px] font-black rounded-xl uppercase active:scale-95 italic">GÜNÜ KAPAT</button>
            <button onclick="aySifirla()" class="py-2.5 bg-red-600 text-white text-[9px] font-black rounded-xl uppercase active:scale-95 italic">AYI SIFIRLA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDpT9QsG7V23KtKZMVXmIfeX_Mg-eAeBZM", databaseURL: "https://berberkasa-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "berberkasa" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let p = 'ahmet'; let hesaplanmisNet = 0;
        const ayID = new Date().getFullYear() + "-" + (new Date().getMonth() + 1);
        document.getElementById('bugunTarih').innerText = new Date().toLocaleDateString('tr-TR', { day:'2-digit', month:'long', year:'numeric' });

        function pSec(sec) { p = sec; document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active-p')); document.getElementById('btn' + sec).classList.add('active-p'); }
        function hizliDoldur(islem, fiyat) { document.getElementById('h').value = islem; document.getElementById('t').value = fiyat; }
        
        function kaydet() {
            const h = document.getElementById('h').value; const t = parseFloat(document.getElementById('t').value); const y = document.getElementById('y').value;
            if(!h || isNaN(t)) return;
            db.ref('kasa/').push({ h, t, y, p, saat: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'}) });
            document.getElementById('h').value = ''; document.getElementById('t').value = '';
        }

        db.ref('kasa/').on('value', (snap) => {
            const veriler = snap.val();
            const listDiv = document.getElementById('islemListesi'); listDiv.innerHTML = "";
            let tC=0, gT=0;
            let uD = { Ercan: {Nakit:0, Kart:0, Iban:0, T:0}, Efe: {Nakit:0, Kart:0, Iban:0, T:0} };
            
            if (veriler) {
                Object.keys(veriler).reverse().forEach(key => {
                    const v = veriler[key]; const t = parseFloat(v.t);
                    listDiv.innerHTML += `<div class="islem-row flex justify-between items-center p-1.5 border-b"><span><b>${v.p.toUpperCase()}:</b> ${v.h} (${v.y[0]})</span><div class="flex items-center gap-2"><span>${t} ₺</span><button onclick="db.ref('kasa/${key}').remove()" class="text-red-300 px-1"><i class="fa-solid fa-trash-can"></i></button></div></div>`;
                    
                    if (v.h.includes('Ödeme') || v.p === 'Gider') { gT += t; } 
                    else { 
                        tC += t; 
                        if(uD[v.p]) { uD[v.p][v.y] += t; uD[v.p].T += t; }
                    }
                });
            }

            const eP = Math.floor(uD.Ercan.T * 0.5); const fP = Math.floor(uD.Efe.T * 0.3);
            hesaplanmisNet = Math.floor(tC - (eP + fP + gT));

            // Ekrana Verileri Bas
            document.getElementById('eNakit').innerText = uD.Ercan.Nakit; document.getElementById('eKart').innerText = uD.Ercan.Kart; document.getElementById('eIban').innerText = uD.Ercan.Iban;
            document.getElementById('eToplam').innerText = uD.Ercan.T; document.getElementById('pErcan').innerText = eP;
            
            document.getElementById('fNakit').innerText = uD.Efe.Nakit; document.getElementById('fKart').innerText = uD.Efe.Kart; document.getElementById('fIban').innerText = uD.Efe.Iban;
            document.getElementById('fToplam').innerText = uD.Efe.T; document.getElementById('pEfe').innerText = fP;

            document.getElementById('cToplam').innerText = tC + " ₺";
            document.getElementById('gToplam').innerText = gT + " ₺";
            document.getElementById('netKalan').innerText = hesaplanmisNet + " ₺";
        });

        function veresiyeEkle() { const m = document.getElementById('vMusteri').value; const t = parseFloat(document.getElementById('vTutar').value); if(!m || isNaN(t)) return; db.ref('veresiye/').push({ m, t, tarih: new Date().toLocaleDateString('tr-TR') }); document.getElementById('vMusteri').value = ''; document.getElementById('vTutar').value = ''; }
        function veresiyeListele() { const ara = document.getElementById('vAra').value.toLowerCase(); db.ref('veresiye/').on('value', (snap) => { const liste = document.getElementById('veresiyeListesi'); liste.innerHTML = ""; if(snap.val()) { Object.keys(snap.val()).forEach(key => { const v = snap.val()[key]; if(v.m.toLowerCase().includes(ara)) { liste.innerHTML += `<div class="flex justify-between p-2 border-b"><b>${v.m.toUpperCase()}</b><span>${v.t} ₺ <button onclick="db.ref('kasa/').push({h:'V.Tahsilat',t:${v.t},y:'Nakit',p:'ahmet'}); db.ref('veresiye/${key}').remove()" class="bg-emerald-500 text-white px-1 rounded italic">ALINDI</button></span></div>`; } }); } }); }
        veresiyeListele();
        function kasaSifirla() { if(confirm("Günü kapat?")) { db.ref('aylikNet/' + ayID).transaction(curr => (curr || 0) + hesaplanmisNet); db.ref('kasa/').remove(); } }
        function aySifirla() { if(confirm("Ayı sıfırla?")) db.ref('aylikNet/' + ayID).set(0); }
    </script>
</body>
</html>
